<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskr</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: rgba(255,255,255,0.80);
      --border: rgba(0,0,0,0.08);
      --shadow: 0 2px 20px rgba(0,0,0,0.06);
      --radius: 16px;
      --blue: #0071e3;
      --green: #34c759;
      --red: #ff3b30;
      --orange: #ff9500;
      --purple: #bf5af2;
      --pink: #ff375f;
      --teal: #5ac8fa;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --surface: rgba(28,28,30,0.88);
        --border: rgba(255,255,255,0.10);
        --shadow: 0 2px 20px rgba(0,0,0,0.50);
        --text: #f5f5f7;
        --muted: #86868b;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { border: none; cursor: pointer; font-family: inherit; background: none; }
    select { font-family: inherit; }

    /* ── Layout ─────────────────────────────────────────────── */
    .layout {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      padding: 20px 12px 16px;
    }

    .sidebar-brand {
      font-size: 17px;
      font-weight: 600;
      padding: 4px 12px 20px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
    @media (prefers-color-scheme: dark) {
      .nav-item:hover { background: rgba(255,255,255,0.07); }
    }
    .nav-item.active { background: var(--blue); color: #fff; }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 4px 0;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .ws-info { display: flex; align-items: center; gap: 8px; }
    .ws-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--blue); color: #fff;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ws-name { font-size: 12px; font-weight: 500; color: var(--muted); }

    .refresh-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
    }
    .refresh-dot.pulse {
      animation: dot-pulse 0.9s ease-out forwards;
    }
    @keyframes dot-pulse {
      0%   { transform: scale(1);   box-shadow: 0 0 0 0 rgba(52,199,89,.7); }
      50%  { transform: scale(1.3); box-shadow: 0 0 0 5px rgba(52,199,89,0); }
      100% { transform: scale(1);   box-shadow: 0 0 0 0 rgba(52,199,89,0); }
    }

    /* ── Main ───────────────────────────────────────────────── */
    #main {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 32px 36px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    /* ── Cards ──────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .card-header {
      padding: 15px 20px 13px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .card-body { padding: 4px 0; }

    /* ── Metric cards ───────────────────────────────────────── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 20px 22px;
    }

    .metric-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 34px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .metric-value.danger { color: var(--red); }

    /* ── Dashboard columns ──────────────────────────────────── */
    .dash-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── Task list rows ─────────────────────────────────────── */
    .task-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 20px;
      transition: background 0.1s;
    }
    .task-row:hover { background: rgba(0,0,0,0.025); }
    @media (prefers-color-scheme: dark) { .task-row:hover { background: rgba(255,255,255,0.03); } }

    .avatar {
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 700;
    }

    .task-info { flex: 1; min-width: 0; }
    .task-name {
      font-size: 13.5px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

    /* ── Pills ──────────────────────────────────────────────── */
    .pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 9px;
      border-radius: 100px;
      font-size: 11.5px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pill-ads        { background: rgba(191,90,242,.12); color: var(--purple); }
    .pill-fulfillment{ background: rgba(0,113,227,.12);  color: var(--blue); }
    .pill-creative   { background: rgba(255,55,95,.12);  color: var(--pink); }
    .pill-finance    { background: rgba(52,199,89,.12);  color: var(--green); }
    .pill-operations { background: rgba(255,149,0,.12);  color: var(--orange); }

    .status-pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      color: #fff;
    }
    .s-not-started { background: #3a3a3c; }
    .s-in-progress { background: #0071e3; }
    .s-in-review   { background: #ff9500; }
    .s-complete    { background: #34c759; }
    .s-blocked     { background: #ff3b30; }

    /* Priority dot */
    .p-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .p-high   { background: var(--red); }
    .p-medium { background: var(--orange); }
    .p-low    { background: var(--green); }

    /* ── Filter bar ─────────────────────────────────────────── */
    .filter-bar { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-tab {
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }
    .filter-tab:hover { background: rgba(0,0,0,0.04); color: var(--text); }
    @media (prefers-color-scheme: dark) { .filter-tab:hover { background: rgba(255,255,255,0.07); } }
    .filter-tab.active { background: var(--blue); color: #fff; }

    .search-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .search-input, .cat-select {
      height: 36px;
      padding: 0 12px;
      border: none;
      border-radius: 10px;
      background: rgba(0,0,0,0.05);
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: background 0.1s;
    }
    @media (prefers-color-scheme: dark) {
      .search-input, .cat-select { background: rgba(255,255,255,0.08); }
    }
    .search-input:focus, .cat-select:focus { background: rgba(0,0,0,0.08); }
    @media (prefers-color-scheme: dark) {
      .search-input:focus, .cat-select:focus { background: rgba(255,255,255,0.13); }
    }
    .search-input { flex: 1; }
    .cat-select { min-width: 160px; }
    .cat-select option { background: #fff; color: #000; }
    @media (prefers-color-scheme: dark) {
      .cat-select option { background: #1c1c1e; color: #f5f5f7; }
    }

    /* ── Table ──────────────────────────────────────────────── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }

    th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      background: transparent;
      white-space: nowrap;
    }
    th.th-cb { width: 44px; padding-right: 0; }

    td {
      padding: 11px 16px;
      border-bottom: 0.5px solid rgba(255,255,255,0.05);
      color: var(--text);
      vertical-align: middle;
      background: rgba(255,255,255,0.03);
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { cursor: pointer; transition: background 0.08s; }
    tbody tr:hover td { background: rgba(255,255,255,0.06); }

    .res-link-icon { color: var(--blue); font-size: 13px; }
    .sop-link-icon { color: var(--blue); font-size: 15px; }
    .sop-dash { color: var(--muted); }
    .td-task { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 15px; font-weight: 500; color: #f5f5f7; }
    .td-assignee { display: flex; align-items: center; gap: 8px; }
    .td-cb { width: 44px; padding-right: 0; }

    /* ── Task checkbox ──────────────────────────────────────────── */
    .task-cb {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.22);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
      padding: 0;
      flex-shrink: 0;
    }
    .task-cb:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.06); }
    .task-cb.checked { background: #34c759; border-color: #34c759; }
    .cb-check {
      width: 11px; height: 9px;
      opacity: 0; transform: scale(0.5);
      transition: opacity 0.15s, transform 0.15s;
      pointer-events: none;
    }
    .task-cb.checked .cb-check { opacity: 1; transform: scale(1); }
    @keyframes cb-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }
    .task-cb.popping { animation: cb-pop 0.22s ease; }

    /* ── Overlay + Panel ────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.30);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }

    .panel {
      position: fixed; top: 0; right: 0;
      width: 380px; height: 100vh;
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 32px rgba(0,0,0,0.12);
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.26s cubic-bezier(0.32, 0, 0.12, 1);
      display: flex;
      flex-direction: column;
    }
    .panel.open { transform: translateX(0); }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .panel-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      line-height: 1.3;
    }
    .panel-close {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--muted);
      flex-shrink: 0; margin-top: 1px;
      transition: background 0.1s;
    }
    @media (prefers-color-scheme: dark) { .panel-close { background: rgba(255,255,255,0.09); } }
    .panel-close:hover { background: rgba(0,0,0,0.12); }
    @media (prefers-color-scheme: dark) { .panel-close:hover { background: rgba(255,255,255,0.16); } }
    .panel-body { flex: 1; overflow-y: auto; padding: 20px; }

    .d-section { margin-bottom: 20px; }
    .d-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .d-value { font-size: 13.5px; color: var(--text); }
    .d-sop-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--blue);
      font-size: 13.5px;
      font-weight: 500;
    }
    .d-sop-link:hover { text-decoration: underline; }

    /* ── Performance ────────────────────────────────────────── */
    .leaderboard {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 16px 20px 14px;
      min-width: 130px;
      text-align: center;
    }
    .podium-item.rank-1 { padding-top: 24px; }

    .medal { font-size: 26px; line-height: 1; }
    .podium-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .podium-rate { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }

    .rate-cell { display: flex; align-items: center; gap: 10px; }
    .rate-pct { font-weight: 600; font-size: 13px; min-width: 38px; text-align: right; }
    .rate-bar-bg {
      flex: 1; height: 4px;
      background: rgba(0,0,0,0.07);
      border-radius: 100px; overflow: hidden;
    }
    @media (prefers-color-scheme: dark) { .rate-bar-bg { background: rgba(255,255,255,0.09); } }
    .rate-bar-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 100px;
      transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Resources page ─────────────────────────────────────── */
    .res-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .res-section-title { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .res-card {
      background: rgba(255,255,255,0.055); border: 0.5px solid rgba(255,255,255,0.09);
      border-radius: 14px; padding: 18px; cursor: pointer;
      transition: background 0.14s; display: flex; flex-direction: column; gap: 8px;
    }
    .res-card:hover { background: rgba(255,255,255,0.09); }
    .res-card-title { font-size: 15px; font-weight: 600; color: #f5f5f7; }
    .res-card-preview { font-size: 13px; color: var(--muted); line-height: 1.45; min-height: 36px; flex: 1; }
    .res-card-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .res-card-date { font-size: 11px; color: var(--muted); margin-left: auto; }
    .res-textarea { min-height: 220px; resize: vertical; font-size: 13px; line-height: 1.65; }
    .view-plan-btn { margin-top: 8px; padding: 8px 14px; border-radius: 8px; background: rgba(0,113,227,0.12); color: var(--blue); border: none; cursor: pointer; font-size: 13px; font-weight: 500; width: 100%; transition: background 0.12s; text-align: left; }
    .view-plan-btn:hover { background: rgba(0,113,227,0.22); }
    .back-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 0 0 14px; display: flex; align-items: center; gap: 4px; }
    .back-btn:hover { color: var(--text); }
    .delete-resource-btn { padding: 10px 16px; border-radius: 10px; background: rgba(255,59,48,0.1); color: var(--red); border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.12s; flex-shrink: 0; }
    .delete-resource-btn:hover { background: rgba(255,59,48,0.2); }
    .res-icon { font-size: 12px; opacity: 0.6; }

    /* ── Empty / loading ────────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      gap: 6px;
    }
    .empty-icon { font-size: 30px; margin-bottom: 2px; }

    /* ── New-task button ────────────────────────────────────── */
    .new-task-btn {
      height: 36px;
      padding: 0 16px;
      background: var(--blue);
      color: #fff;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      border: none;
      transition: opacity 0.1s;
      flex-shrink: 0;
    }
    .new-task-btn:hover { opacity: 0.85; }

    /* ── Create-task form ───────────────────────────────────── */
    .form-field { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(0,0,0,0.03);
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.12s, background 0.12s;
      appearance: none;
    }
    @media (prefers-color-scheme: dark) {
      .form-input { background: rgba(255,255,255,0.06); }
    }
    .form-input:focus { border-color: var(--blue); background: rgba(0,113,227,0.04); }
    @media (prefers-color-scheme: dark) {
      .form-input:focus { background: rgba(0,113,227,0.12); }
    }
    select.form-input { cursor: pointer; }
    .form-hint { font-size: 11.5px; color: var(--muted); margin-top: 4px; }

    .submit-btn {
      display: block;
      width: 100%;
      height: 40px;
      margin-top: 8px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .form-error {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(255,59,48,0.08);
      border: 1px solid rgba(255,59,48,0.2);
      border-radius: 10px;
      font-size: 12.5px;
      color: var(--red);
    }

    /* ── View toggle ────────────────────────────────────────────── */
    .view-toggle { display: flex; gap: 3px; }
    .view-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      border: none;
      padding: 0;
    }
    .view-btn:hover { background: rgba(255,255,255,0.10); color: var(--text); }
    .view-btn.active { background: rgba(255,255,255,0.14); color: #f5f5f7; }
    .view-btn svg { width: 15px; height: 15px; }

    /* ── Kanban board ───────────────────────────────────────────── */
    .kb-board {
      display: flex; gap: 12px; overflow-x: auto;
      padding-bottom: 24px; align-items: flex-start;
    }
    .kb-board::-webkit-scrollbar { height: 5px; }
    .kb-board::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 100px; }

    .kb-col { flex-shrink: 0; width: 280px; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; }
    .kb-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px 10px;
      background: rgba(255,255,255,0.04);
    }
    .kb-col-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .kb-col-count {
      font-size: 11.5px; color: var(--muted);
      background: rgba(255,255,255,0.07);
      padding: 1px 8px; border-radius: 100px;
    }
    .kb-col-body {
      display: flex; flex-direction: column; gap: 8px;
      min-height: 60px;
      background: rgba(255,255,255,0.03);
      padding: 8px;
    }
    .kb-col-footer { background: rgba(255,255,255,0.03); padding: 4px 6px 8px; }

    .kb-card {
      background: rgba(255,255,255,0.055);
      border: 0.5px solid rgba(255,255,255,0.09);
      border-radius: 12px; padding: 16px;
      cursor: pointer; position: relative;
      transition: background 0.15s, opacity 0.25s;
    }
    .kb-card:hover { background: rgba(255,255,255,0.09); }
    .kb-card.overdue { border-left: 2px solid #ff3b30; }
    .kb-card.kb-done { opacity: 0.6; }

    .kb-card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px; margin-bottom: 10px;
    }
    .kb-card-name { font-size: 15px; font-weight: 600; color: #f5f5f7; line-height: 1.35; flex: 1; }
    .kb-done-badge {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      background: #34c759; display: flex; align-items: center; justify-content: center;
    }
    .kb-done-badge svg { width: 10px; height: 9px; }
    .kb-assignee-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .kb-assignee { font-size: 12px; color: var(--muted); }
    .kb-meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .kb-due { font-size: 12px; color: var(--muted); }
    .kb-due.kb-overdue { color: var(--red); font-weight: 600; }
    .kb-card-footer {
      display: flex; align-items: center; justify-content: flex-end;
      border-top: 0.5px solid rgba(255,255,255,0.07);
      padding-top: 10px; margin-top: 2px;
    }
    .kb-move-btn {
      font-size: 12px; color: var(--muted);
      background: rgba(255,255,255,0.06); border: none; cursor: pointer;
      padding: 4px 10px; border-radius: 6px;
      transition: background 0.12s, color 0.12s; position: relative;
    }
    .kb-move-btn:hover { background: rgba(255,255,255,0.13); color: var(--text); }
    .kb-move-menu {
      position: fixed;
      background: #2c2c2e; border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      z-index: 2000; min-width: 150px; overflow: hidden;
      animation: menuIn 0.12s ease;
    }
    @keyframes menuIn { from { opacity:0; transform:scale(0.95) translateY(4px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .kb-move-item {
      display: block; width: 100%; text-align: left;
      padding: 10px 14px; font-size: 13px; color: var(--text);
      background: none; border: none; cursor: pointer; transition: background 0.1s;
    }
    .kb-move-item:hover { background: rgba(255,255,255,0.08); }
    .kb-move-item.current { color: var(--muted); cursor: default; }
    .kb-move-item.current:hover { background: none; }
    .kb-add-btn {
      width: 100%; padding: 9px 14px; border-radius: 8px;
      font-size: 12px; color: var(--muted);
      background: none; border: none; cursor: pointer; text-align: left;
      transition: background 0.12s, color 0.12s;
    }
    .kb-add-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .kb-empty { font-size: 12px; color: var(--muted); padding: 16px 4px; text-align: center; }

    /* Segmented status control in detail panel */
    .status-seg { display: flex; gap: 4px; flex-wrap: wrap; }
    .status-seg-btn {
      flex: 1; min-width: 72px; padding: 8px 4px; border-radius: 8px;
      font-size: 12px; font-weight: 500; text-align: center;
      background: rgba(255,255,255,0.06); border: none; cursor: pointer;
      color: var(--muted); transition: background 0.14s, color 0.14s; white-space: nowrap;
    }
    .status-seg-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .status-seg-btn.seg-active { background: #0071e3; color: #fff; }
    .status-seg-btn.seg-active.s-done { background: #34c759; }
    .status-seg-btn.seg-active.s-blocked { background: #ff3b30; }
    .status-seg-btn.seg-active.s-review { background: #ff9500; }
    .status-seg-btn.seg-active.s-todo { background: #3a3a3c; color: var(--text); }

    /* ── Completed page ─────────────────────────────────────────── */
    .completed-stats {
      display: flex; gap: 12px; margin-bottom: 24px;
    }
    .completed-stat {
      background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 16px 22px; min-width: 140px;
    }
    .completed-stat-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .completed-stat-value { font-size: 28px; font-weight: 700; color: #34c759; }
    .restore-btn {
      font-size: 12px; color: var(--blue);
      background: rgba(0,113,227,0.1); border: none; cursor: pointer;
      padding: 4px 12px; border-radius: 6px; white-space: nowrap;
      transition: background 0.12s;
    }
    .restore-btn:hover { background: rgba(0,113,227,0.2); }
    .restore-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    tr.completed-row td { opacity: 0.65; }
    tr.completed-row .td-task-done { text-decoration: line-through; color: var(--muted); }

    /* ── Resource doc icon (kanban) ─────────────────────────────── */
    .kb-res-icon { font-size: 11px; opacity: 0.55; margin-left: auto; }

    /* ── Reminder pills ─────────────────────────────────────────── */
    .rem-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .rem-pill {
      font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 100px;
      border: none; cursor: pointer; font-family: var(--font);
      background: rgba(255,255,255,.08); color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }
    .rem-pill:hover { background: rgba(255,255,255,.14); color: var(--text); }
    .rem-pill-active { background: #0071e3 !important; color: #fff !important; }
    .reminder-active-pill {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12.5px; font-weight: 500;
      color: var(--orange); background: rgba(255,149,0,.12);
      border: 1px solid rgba(255,149,0,.25); border-radius: 100px;
      padding: 5px 14px;
    }
    .reminder-cancel-btn {
      background: none; border: none; cursor: pointer;
      color: var(--orange); font-size: 15px; line-height: 1;
      padding: 0 0 0 2px; font-family: var(--font);
    }
    .reminder-cancel-btn:hover { color: var(--red); }

    /* ── Recurring tasks page ───────────────────────────────────── */
    .rc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; margin-top: 16px; }
    .rc-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
      transition: border-color 0.15s, opacity 0.2s;
    }
    .rc-card:hover { border-color: rgba(255,255,255,0.22); }
    .rc-card.rc-paused { opacity: 0.5; }
    .rc-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .rc-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.3; }
    .rc-menu-btn {
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 18px; padding: 0 4px; line-height: 1; border-radius: 5px;
      flex-shrink: 0; font-family: var(--font);
    }
    .rc-menu-btn:hover { color: var(--text); background: rgba(255,255,255,0.08); }
    .rc-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .freq-badge {
      font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px;
      background: rgba(10,132,255,0.15); color: #0a84ff; letter-spacing: 0.02em;
    }
    .rc-status { display: flex; align-items: center; gap: 5px; margin-top: 10px; }
    .rc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .rc-dot.rc-active { background: #34c759; }
    .rc-dot.rc-inactive { background: rgba(255,255,255,0.28); }
    .rc-status-label { font-size: 12px; color: var(--muted); }
    .rc-next { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .rc-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .rc-empty-icon { font-size: 36px; margin-bottom: 12px; }

    /* DOW / DOM pickers */
    .dow-picker { display: flex; gap: 4px; flex-wrap: wrap; }
    .dow-btn {
      padding: 4px 9px; border-radius: 6px; font-size: 12px; font-weight: 500;
      border: 1.5px solid rgba(255,255,255,0.12); background: none;
      color: var(--muted); cursor: pointer; font-family: var(--font);
      transition: all 0.12s;
    }
    .dow-btn.selected { border-color: #0071e3; background: rgba(0,113,227,0.15); color: var(--text); }

    /* ── People picker ──────────────────────────────────────────── */
    .people-picker { display: flex; flex-wrap: wrap; gap: 6px; }
    .person-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 10px 5px 5px; border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      cursor: pointer; font-size: 13px; color: var(--text);
      font-family: var(--font);
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .person-pill:hover { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.07); }
    .person-pill.pp-selected { border-color: #0071e3; background: rgba(0,113,227,0.12); }
    .pp-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      font-size: 9px; font-weight: 700; color: white; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .pp-check { color: #0071e3; font-size: 11px; line-height: 1; font-weight: 700; }

    /* ── Avatar stack ────────────────────────────────────────────── */
    .av-stack { display: flex; align-items: center; }
    .av-stack .av {
      width: 22px; height: 22px; border-radius: 50%;
      font-size: 8px; font-weight: 700; color: white;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--bg); margin-left: -5px; flex-shrink: 0;
    }
    .av-stack .av:first-child { margin-left: 0; }
    .av-overflow { background: rgba(255,255,255,0.18) !important; color: var(--muted) !important; }

    /* ── Panel tabs ──────────────────────────────────────────────── */
    .panel-tabs { display: flex; gap: 2px; margin-bottom: 12px; }
    .panel-tab {
      font-size: 13px; color: var(--muted); background: none;
      border: none; cursor: pointer; padding: 5px 10px; border-radius: 100px;
      display: inline-flex; align-items: center; gap: 5px; font-family: var(--font);
      transition: background 0.1s, color 0.1s;
    }
    .panel-tab.active { background: rgba(255,255,255,.12); color: var(--text); font-weight: 500; }
    .panel-tab:hover:not(.active) { background: rgba(255,255,255,.06); color: rgba(255,255,255,.7); }
    .tab-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }

    /* ── Inline task resources ───────────────────────────────────── */
    .res-item-card {
      border: 1px solid rgba(255,255,255,.08); border-radius: 10px;
      padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,.02);
    }
    .del-res-btn {
      font-size: 11px; color: var(--red); background: none; border: none;
      cursor: pointer; padding: 2px 4px; border-radius: 4px; flex-shrink: 0;
      transition: background 0.1s;
    }
    .del-res-btn:hover { background: rgba(255,59,48,.12); }
    .add-res-btn {
      font-size: 12.5px; color: var(--blue);
      background: rgba(10,132,255,.10); border: 1px solid rgba(10,132,255,.20);
      border-radius: 8px; padding: 6px 12px; cursor: pointer;
      font-family: var(--font); transition: background 0.1s; margin-top: 4px;
    }
    .add-res-btn:hover { background: rgba(10,132,255,.18); }

    /* ── Panel save button ──────────────────────────────────────── */
    .panel-save-btn {
      display: block; width: 100%; height: 40px;
      margin-top: 6px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 10px;
      font-family: var(--font); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.1s, background 0.25s;
    }
    .panel-save-btn:hover { opacity: 0.85; }
    .panel-save-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>

  </div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const state = {
    page: 'dashboard',
    tasks: [],
    archive: [],
    resources: [],
    tasksMeta: {}, // { taskId: { notes, sop, sopLink, resources, assignees } }
    perf: { members: [], topPerformer: null, generatedAt: null },
    filter: { status: 'All', search: '', category: '' },
    viewMode: 'table',
    workspaceUsers: [],
    recurring: [],
  };

  const TEAM = ['Gelika', 'Irakli', 'N1ka', 'Cole', 'Harihar Singh'];

  const INTERVAL_LABELS = {
    '10min': '10 min', '30min': '30 min',
    '1hr': '1 hr', '2hr': '2 hr', '4hr': '4 hr', '6hr': '6 hr', '8hr': '8 hr',
  };
  const REMINDER_OPTIONS = [
    ['10min','10 min'],['30min','30 min'],['1hr','1 hr'],
    ['2hr','2 hr'],['4hr','4 hr'],['6hr','6 hr'],['8hr','8 hr'],
  ];

  // ── Utils ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m - 1];
    return `${mon} ${+day}, ${y}`;
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function weekStartStr() {
    const d = new Date();
    const dow = d.getDay();
    d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function daysAgo(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr + 'T00:00:00');
    return Math.floor((today - d) / 86400000);
  }

  function initials(name) {
    if (!name) return '?';
    const p = name.trim().split(/\s+/);
    return p.length >= 2 ? (p[0][0] + p[1][0]).toUpperCase() : p[0].slice(0,2).toUpperCase();
  }

  function firstName(name) {
    return name?.trim().split(/\s+/)[0] || 'Unknown';
  }

  const COLORS = ['#0071e3','#34c759','#ff9500','#bf5af2','#ff375f','#5ac8fa','#30d158'];
  function avatarColor(name) {
    let h = 0;
    for (let i = 0; i < (name||'').length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function avatarHtml(name, size = 30) {
    const c = avatarColor(name || '?');
    const fs = Math.floor(size * 0.38);
    return `<div class="avatar" style="width:${size}px;height:${size}px;background:${c};font-size:${fs}px">${esc(initials(name||'?'))}</div>`;
  }

  // Overlapping avatar stack for multi-assignee display
  function avatarStackHtml(names, size = 22) {
    if (!names || names.length === 0) {
      return `<div class="td-assignee">${avatarHtml('?', size)}<span style="font-size:13px;color:var(--muted)">Unassigned</span></div>`;
    }
    const shown = names.slice(0, 3);
    const overflow = names.length - 3;
    const fs = Math.floor(size * 0.38);
    return `<div class="av-stack" title="${esc(names.join(', '))}">
      ${shown.map(n => `<div class="av" style="width:${size}px;height:${size}px;background:${avatarColor(n)};font-size:${fs}px">${esc(initials(n))}</div>`).join('')}
      ${overflow > 0 ? `<div class="av av-overflow" style="width:${size}px;height:${size}px;font-size:${fs}px">+${overflow}</div>` : ''}
    </div>`;
  }

  // People picker HTML (multi-select pills)
  function peoplePicker(selectedNames = [], pickerId = 'pp', taskId = null) {
    const taskArg = taskId ? `,'${esc(taskId)}'` : '';
    return `<div class="people-picker" id="${esc(pickerId)}">
      ${TEAM.map(name => {
        const sel = selectedNames.includes(name);
        const c = avatarColor(name);
        return `<button type="button" class="person-pill${sel ? ' pp-selected' : ''}"
          onclick="togglePersonPill('${esc(pickerId)}','${esc(name)}'${taskArg})"
          data-name="${esc(name)}">
          <span class="pp-avatar" style="background:${c}">${esc(initials(name))}</span>
          ${esc(name)}${sel ? '<span class="pp-check">✓</span>' : ''}
        </button>`;
      }).join('')}
    </div>`;
  }

  function togglePersonPill(pickerId, name, taskId = null) {
    const container = document.getElementById(pickerId);
    if (!container) return;
    const pill = Array.from(container.querySelectorAll('.person-pill')).find(p => p.dataset.name === name);
    if (!pill) return;
    const isSelected = pill.classList.toggle('pp-selected');
    let check = pill.querySelector('.pp-check');
    if (isSelected && !check) {
      check = document.createElement('span');
      check.className = 'pp-check';
      check.textContent = '✓';
      pill.appendChild(check);
    } else if (!isSelected && check) {
      check.remove();
    }
    if (taskId) scheduleMetaSave(taskId);
  }

  function getPickerSelections(pickerId) {
    const container = document.getElementById(pickerId);
    if (!container) return [];
    return Array.from(container.querySelectorAll('.person-pill.pp-selected')).map(p => p.dataset.name);
  }

  function catPill(cat) {
    if (!cat) return '';
    const cls = {Ads:'pill-ads',Fulfillment:'pill-fulfillment',Creative:'pill-creative',Finance:'pill-finance',Operations:'pill-operations'}[cat] || '';
    return `<span class="pill ${cls}">${esc(cat)}</span>`;
  }

  function statusPill(s) {
    if (!s) return '';
    const cls = {'To do':'s-not-started','In progress':'s-in-progress','In review':'s-in-review','Done':'s-complete'}[s] || 's-not-started';
    return `<span class="status-pill ${cls}">${esc(s)}</span>`;
  }

  function prioHtml(p) {
    if (!p) return `<span style="color:var(--muted)">—</span>`;
    const lower = p.toLowerCase();
    const cls = lower.includes('high') ? 'p-high' : lower.includes('medium') ? 'p-medium' : lower.includes('low') ? 'p-low' : '';
    const label = p.replace(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}️‍\s]+/u, '').trim() || p;
    return `<div style="display:flex;align-items:center;gap:6px"><div class="p-dot ${cls}"></div><span style="font-size:13px;color:var(--text)">${esc(label)}</span></div>`;
  }

  function fmtDateTime(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function dueDateHtml(d) {
    if (!d) return `<span style="color:var(--muted)">—</span>`;
    const today = todayStr();
    const over = d < today, now = d === today;
    const style = over ? 'color:var(--red);font-weight:600' : now ? 'color:var(--orange);font-weight:600' : '';
    return `<span style="${style}">${esc(fmtDate(d))}</span>`;
  }

  // ── Data fetching ──────────────────────────────────────────────────────────
  async function fetchAll() {
    try {
      const [tr, pr, ar, rr, mr, rcr] = await Promise.all([
        fetch('/tasks').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch('/performance').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch('/archive').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch('/resources').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch('/tasks-meta').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch('/recurring').then(r => r.ok ? r.json() : null).catch(() => null),
      ]);
      if (tr?.tasks) state.tasks = tr.tasks.filter(t => t.status !== 'Done');
      if (pr?.members) state.perf = pr;
      if (ar?.tasks) state.archive = ar.tasks;
      if (rr?.resources) state.resources = rr.resources;
      if (mr?.meta) state.tasksMeta = mr.meta;
      if (rcr?.recurring) state.recurring = rcr.recurring;
      flashDot();
    } catch (e) {
      console.warn('[taskr] fetch error:', e.message);
    }
    render();
  }

  function flashDot() {
    const dot = document.getElementById('refreshDot');
    if (!dot) return;
    dot.classList.remove('pulse');
    void dot.offsetWidth;
    dot.classList.add('pulse');
    setTimeout(() => dot.classList.remove('pulse'), 900);
  }

  // ── Navigation ─────────────────────────────────────────────────────────────
  function navigate(page) {
    state.page = page;
    state.filter = { status: 'All', search: '', category: '' };
    document.querySelectorAll('.nav-item').forEach(el =>
      el.classList.toggle('active', el.dataset.page === page)
    );
    closePanel();
    render();
  }

  // ── Panel ──────────────────────────────────────────────────────────────────
  let panelTaskId = null;
  let panelActiveTab = 'notes';
  let metaSaveTimer = null;

  async function openPanel(taskId, focusField = null) {
    panelTaskId = taskId;
    panelActiveTab = 'notes';
    clearTimeout(metaSaveTimer);
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    document.getElementById('panelTitle').textContent = task.name;
    document.getElementById('panelBody').innerHTML = '<div class="empty" style="padding:32px"><div class="empty-icon">⏳</div>Loading…</div>';
    document.getElementById('overlay').classList.add('show');
    document.getElementById('panel').classList.add('open');

    const [ur, rr] = await Promise.all([
      fetch('/users').then(r => r.ok ? r.json() : null).catch(() => null),
      fetch('/reminders').then(r => r.ok ? r.json() : null).catch(() => null),
    ]);
    if (panelTaskId !== taskId) return; // panel was reopened for a different task
    const users = ur?.users || [];
    state.workspaceUsers = users;
    const activeReminder = (rr?.reminders || []).find(r => r.taskId === taskId) || null;

    document.getElementById('panelBody').innerHTML = panelContent(task, users, activeReminder);

    if (focusField) {
      setTimeout(() => {
        const el = document.getElementById(`edit_${focusField}`);
        if (el) { el.focus(); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      }, 60);
    }
  }

  function closePanel() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('panel').classList.remove('open');
  }

  function panelContent(t, users = [], activeReminder = null) {
    const edited = t.lastEdited
      ? new Date(t.lastEdited).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
      : '—';

    const metaAssignees = (state.tasksMeta[t.id]?.assignees?.length)
      ? state.tasksMeta[t.id].assignees
      : (t.assignees || []);
    const assigneeField = peoplePicker(metaAssignees, 'panel-pp', t.id);

    const meta = state.tasksMeta[t.id] || { notes: '', sop: '', sopLink: '', resources: [] };
    const hasNotes = !!(meta.notes?.trim());
    const hasSop   = !!(meta.sop?.trim() || meta.sopLink?.trim());
    const hasRes   = !!(meta.resources?.length);

    const reminderSection = activeReminder
      ? `<div class="reminder-active-pill">
           ⏰ Reminding every ${INTERVAL_LABELS[activeReminder.intervalKey] || activeReminder.intervalKey}
           <button type="button" class="reminder-cancel-btn" onclick="cancelReminderForTask('${esc(t.id)}')">×</button>
         </div>`
      : `<div class="rem-pills">
           ${REMINDER_OPTIONS.map(([key, label]) =>
             `<button type="button" class="rem-pill" onclick="setReminderForTask('${esc(t.id)}','${esc(t.name)}','${key}')">${label}</button>`
           ).join('')}
         </div>`;

    return `
      <div class="form-field">
        <label class="form-label" for="edit_name">Task Name</label>
        <input id="edit_name" class="form-input" type="text" value="${esc(t.name)}" placeholder="Task name">
      </div>
      <div class="form-field">
        <div class="form-label">Status</div>
        <input type="hidden" id="edit_status" value="${esc(t.status || '')}">
        <div class="status-seg">
          ${[['To do','s-todo'],['In progress','s-progress'],['In review','s-review'],['Done','s-done'],['Blocked','s-blocked']].map(([s,cls]) =>
            `<button type="button" class="status-seg-btn ${cls}${t.status === s ? ' seg-active' : ''}" data-s="${esc(s)}" onclick="panelSetStatus('${esc(s)}')">${s}</button>`
          ).join('')}
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Assignee</label>
        ${assigneeField}
      </div>
      <div class="form-field">
        <label class="form-label" for="edit_dueDate">Due Date</label>
        <input id="edit_dueDate" class="form-input" type="date" value="${esc(t.dueDate || '')}">
      </div>
      <div class="form-field">
        <label class="form-label" for="edit_priority">Priority</label>
        <select id="edit_priority" class="form-input">
          <option value="">—</option>
          ${['🔴 High','🟡 Medium','🟢 Low'].map(p => {
            const label = p.replace(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}️‍\s]+/u, '').trim();
            return `<option value="${esc(p)}"${t.priority === p ? ' selected' : ''}>${label}</option>`;
          }).join('')}
        </select>
      </div>
      <div class="form-field">
        <label class="form-label" for="edit_category">Category</label>
        <select id="edit_category" class="form-input">
          <option value="">—</option>
          ${['Ads','Fulfillment','Creative','Finance','Operations','Marketing','Accounting'].map(c =>
            `<option value="${c}"${t.category === c ? ' selected' : ''}>${c}</option>`
          ).join('')}
        </select>
      </div>
      <div class="form-field">
        <div class="form-label">Set Reminder</div>
        ${reminderSection}
      </div>
      <div class="form-field">
        <div class="form-label">Last Edited</div>
        <div style="font-size:12.5px;color:var(--muted)">${esc(edited)}</div>
      </div>
      <button type="button" id="saveBtn" class="panel-save-btn" onclick="saveTask()">Save</button>
      <div id="saveError" style="display:none;margin-top:8px" class="form-error"></div>

      <div style="border-top:1px solid rgba(255,255,255,.07);padding-top:16px;margin-top:16px">
        <div class="panel-tabs">
          ${['notes','sop','resources'].map(tab => {
            const hasDot = tab === 'notes' ? hasNotes : tab === 'sop' ? hasSop : hasRes;
            return `<button class="panel-tab${panelActiveTab === tab ? ' active' : ''}" data-tab="${tab}" onclick="switchTab('${tab}')">
              ${tab.charAt(0).toUpperCase() + tab.slice(1)}${hasDot ? '<span class="tab-dot"></span>' : ''}
            </button>`;
          }).join('')}
        </div>

        <div class="tab-panel" data-panel="notes" style="display:${panelActiveTab==='notes'?'block':'none'}">
          <textarea id="meta_notes" class="form-input res-textarea" style="min-height:120px"
            placeholder="Add notes, context, or instructions..."
            oninput="scheduleMetaSave('${esc(t.id)}')">${esc(meta.notes || '')}</textarea>
        </div>

        <div class="tab-panel" data-panel="sop" style="display:${panelActiveTab==='sop'?'block':'none'}">
          <textarea id="meta_sop" class="form-input res-textarea" style="min-height:120px;margin-bottom:8px"
            placeholder="Paste your SOP steps here..."
            oninput="scheduleMetaSave('${esc(t.id)}')">${esc(meta.sop || '')}</textarea>
          <input id="meta_sopLink" class="form-input" type="url"
            value="${esc(meta.sopLink || '')}" placeholder="https://..."
            oninput="scheduleMetaSave('${esc(t.id)}')">
        </div>

        <div class="tab-panel" data-panel="resources" style="display:${panelActiveTab==='resources'?'block':'none'}">
          <div id="meta-resources-list">
            ${(meta.resources || []).map(r => `
              <div class="res-item-card meta-res-card" data-res-id="${esc(r.id)}">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                  <input class="form-input meta-res-title" type="text" value="${esc(r.title)}"
                    placeholder="Resource title" style="flex:1;font-size:13px;font-weight:500"
                    oninput="scheduleMetaSave('${esc(t.id)}')">
                  <button class="del-res-btn" onclick="deleteMetaResource(this,'${esc(t.id)}')">✕ Remove</button>
                </div>
                <textarea class="form-input res-textarea meta-res-content" style="min-height:80px"
                  placeholder="Content…" oninput="scheduleMetaSave('${esc(t.id)}')">${esc(r.content || '')}</textarea>
              </div>`).join('')}
          </div>
          <button type="button" class="add-res-btn" onclick="addMetaResource('${esc(t.id)}')">+ Add resource</button>
        </div>
      </div>
    `;
  }

  // ── Filter handler ─────────────────────────────────────────────────────────
  function setFilter(key, val) {
    const wasFocused = document.activeElement?.classList.contains('search-input');
    state.filter[key] = val;
    render();
    if (wasFocused) {
      const inp = document.querySelector('.search-input');
      if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
    }
  }

  // ── Metrics ────────────────────────────────────────────────────────────────
  function computeMetrics() {
    const today = todayStr(), wStart = weekStartStr();
    const named     = state.tasks.filter(t => t.name?.trim());
    const dueToday  = named.filter(t => t.dueDate === today && t.status !== 'Done');
    const overdue   = named.filter(t => t.dueDate && t.dueDate < today && t.status !== 'Done');
    const doneWeek  = named.filter(t => t.status === 'Done' && t.dueDate >= wStart && t.dueDate <= today);
    const ms = state.perf.members || [];
    const totA = ms.reduce((s,m) => s + m.assigned, 0);
    const totC = ms.reduce((s,m) => s + m.completed, 0);
    const teamRate = totA > 0 ? Math.round((totC / totA) * 100) : 0;
    return { dueToday, overdue, doneWeek, teamRate };
  }

  // ── Page renderers ─────────────────────────────────────────────────────────

  function renderDashboard() {
    const { dueToday, overdue, doneWeek, teamRate } = computeMetrics();
    const odClass = overdue.length > 0 ? ' danger' : '';

    const taskRow = (t, sub, subStyle = '') => {
      const a = t.assignees?.[0] || 'Unassigned';
      return `<div class="task-row">
        ${avatarHtml(a)}
        <div class="task-info">
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-sub" style="${subStyle}">${esc(sub)}</div>
        </div>
        ${catPill(t.category)}
        ${prioHtml(t.priority)}
      </div>`;
    };

    return `
      <div class="page-title">Dashboard</div>
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Due Today</div>
          <div class="metric-value">${dueToday.length}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Overdue</div>
          <div class="metric-value${odClass}">${overdue.length}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Completed This Week</div>
          <div class="metric-value">${doneWeek.length}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Team Completion Rate</div>
          <div class="metric-value">${teamRate}%</div>
        </div>
      </div>
      <div class="dash-cols">
        <div class="card">
          <div class="card-header">📋 Due Today</div>
          <div class="card-body">
            ${dueToday.length === 0
              ? '<div class="empty"><div class="empty-icon">✅</div>Nothing due today</div>'
              : dueToday.map(t => taskRow(t, firstName(t.assignees?.[0] || 'Unassigned'))).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-header">⚠️ Overdue</div>
          <div class="card-body">
            ${overdue.length === 0
              ? '<div class="empty"><div class="empty-icon">🎉</div>No overdue tasks</div>'
              : overdue.map(t => {
                  const d = daysAgo(t.dueDate);
                  return taskRow(t, `${d} day${d !== 1 ? 's' : ''} overdue`, 'color:var(--red)');
                }).join('')}
          </div>
        </div>
      </div>`;
  }

  function renderTasks() {
    if (state.viewMode === 'board') return renderBoard();
    const { status, search, category } = state.filter;
    const ACTIVE_STATUSES = ['All','To do','In progress','In review','Blocked'];
    const CATS = ['Ads','Fulfillment','Creative','Finance','Operations'];

    // Done tasks are in the Completed page — never shown here
    let tasks = state.tasks.filter(t => t.name?.trim() && t.status !== 'Done');
    if (status !== 'All') {
      tasks = tasks.filter(t => t.status === status);
    }
    if (search) {
      const q = search.toLowerCase();
      tasks = tasks.filter(t =>
        t.name.toLowerCase().includes(q) ||
        (t.assignees||[]).some(a => a.toLowerCase().includes(q))
      );
    }
    if (category) tasks = tasks.filter(t => t.category === category);

    return `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        <div class="page-title" style="margin-bottom:0">Tasks</div>
        <div style="display:flex;align-items:center;gap:10px">
          ${viewToggleHtml()}
          <button class="new-task-btn" onclick="openCreatePanel()">+ New Task</button>
        </div>
      </div>
      <div class="filter-bar">
        ${ACTIVE_STATUSES.map(s =>
          `<button class="filter-tab${s === status ? ' active' : ''}" onclick="setFilter('status','${s}')">${s}</button>`
        ).join('')}
        <button class="filter-tab" style="color:var(--muted);margin-left:auto" onclick="navigate('completed')">✓ Completed →</button>
      </div>
      <div class="search-row">
        <input class="search-input" type="text" placeholder="Search tasks or assignees…"
          value="${esc(search)}" oninput="setFilter('search',this.value)">
        <select class="cat-select" onchange="setFilter('category',this.value)">
          <option value="">All categories</option>
          ${CATS.map(c => `<option value="${c}"${c === category ? ' selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="table-wrap">
        ${tasks.length === 0
          ? '<div class="empty"><div class="empty-icon">🔍</div>No tasks match your filters</div>'
          : `<table>
            <thead><tr>
              <th class="th-cb"></th>
              <th>Task</th><th>Assignee</th><th>Category</th>
              <th>Priority</th><th>Due Date</th><th>Status</th>
            </tr></thead>
            <tbody>
              ${tasks.map(t => {
                const assignees = state.tasksMeta[t.id]?.assignees?.length ? state.tasksMeta[t.id].assignees : (t.assignees || []);
                return `<tr data-id="${esc(t.id)}" onclick="openPanel('${esc(t.id)}')">
                  <td class="td-cb" onclick="event.stopPropagation()">
                    <button class="task-cb" onclick="toggleDone('${esc(t.id)}')" aria-label="Mark as done">
                      <svg class="cb-check" viewBox="0 0 11 9" fill="none">
                        <path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                    </button>
                  </td>
                  <td class="td-task">${esc(t.name)}</td>
                  <td>${assignees.length ? avatarStackHtml(assignees, 24) : `<div class="td-assignee"><span style="font-size:13px;color:var(--muted)">Unassigned</span></div>`}</td>
                  <td>${catPill(t.category) || `<span style="color:var(--muted)">—</span>`}</td>
                  <td>${prioHtml(t.priority)}</td>
                  <td>${dueDateHtml(t.dueDate)}</td>
                  <td class="td-status">${statusPill(t.status)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`}
      </div>`;
  }

  function renderPerformance() {
    const members = (state.perf?.members || []).slice().sort((a,b) => b.completionRate - a.completionRate);
    const top3 = members.slice(0, 3);
    const medals = ['🥇','🥈','🥉'];
    // Podium order: 2nd left, 1st center, 3rd right
    const podium = top3.length >= 3
      ? [[top3[1],2],[top3[0],1],[top3[2],3]]
      : top3.map((m,i) => [m, i+1]);

    return `
      <div class="page-title">Performance</div>
      ${top3.length > 0 ? `
        <div class="leaderboard">
          ${podium.map(([m, rank]) => !m ? '' : `
            <div class="podium-item rank-${rank}">
              <div class="medal">${medals[rank-1]}</div>
              ${avatarHtml(m.name, 42)}
              <div class="podium-name">${esc(firstName(m.name))}</div>
              <div class="podium-rate">${m.completionRate}%</div>
            </div>
          `).join('')}
        </div>` : ''}
      <div class="table-wrap">
        ${members.length === 0
          ? '<div class="empty"><div class="empty-icon">📊</div>No performance data yet</div>'
          : `<table>
            <thead><tr>
              <th>Member</th><th>Assigned</th><th>Completed</th><th>Missed</th><th>Rate</th>
            </tr></thead>
            <tbody>
              ${members.map(m => `
                <tr style="cursor:default">
                  <td><div style="display:flex;align-items:center;gap:10px">
                    ${avatarHtml(m.name,28)}
                    <span style="font-weight:500">${esc(m.name)}</span>
                  </div></td>
                  <td style="font-variant-numeric:tabular-nums">${m.assigned}</td>
                  <td style="color:var(--green);font-weight:600;font-variant-numeric:tabular-nums">${m.completed}</td>
                  <td style="${m.missed>0?'color:var(--red);font-weight:600':''};font-variant-numeric:tabular-nums">${m.missed}</td>
                  <td>
                    <div class="rate-cell">
                      <span class="rate-pct">${m.completionRate}%</span>
                      <div class="rate-bar-bg">
                        <div class="rate-bar-fill" style="width:${m.completionRate}%"></div>
                      </div>
                    </div>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>`}
      </div>
      ${state.perf?.generatedAt ? `
        <div style="font-size:11.5px;color:var(--muted);margin-top:10px;text-align:right">
          Last computed: ${new Date(state.perf.generatedAt).toLocaleString()}
        </div>` : ''}`;
  }

  function renderResources() {
    const resources = state.resources;
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        <div class="page-title" style="margin-bottom:0">Resources</div>
        <button class="new-task-btn" onclick="openNewResourcePanel()">+ New Resource</button>
      </div>
      ${resources.length === 0
        ? '<div class="empty"><div class="empty-icon">📄</div>No resources yet — create one to link it to tasks</div>'
        : `<div class="res-grid">
            ${resources.map(r => `
              <div class="res-card" onclick="openResourcePanel('${esc(r.id)}',null)">
                <div class="res-card-title">${esc(r.title)}</div>
                ${r.category ? `<div style="margin:4px 0 6px">${catPill(r.category)}</div>` : ''}
                <div class="res-card-preview">${esc((r.content || '').slice(0, 120))}${(r.content||'').length > 120 ? '…' : ''}</div>
                <div class="res-card-meta">
                  <span class="res-card-date">${r.updatedAt ? fmtDate(r.updatedAt.slice(0,10)) : ''}</span>
                </div>
              </div>`).join('')}
          </div>`}`;
  }

  // ── Create-task panel ──────────────────────────────────────────────────────
  async function openCreatePanel(preStatus = '') {
    let users = [];
    try {
      const r = await fetch('/users');
      if (r.ok) users = (await r.json()).users || [];
    } catch (_) {}

    document.getElementById('panelTitle').textContent = 'New Task';
    document.getElementById('panelBody').innerHTML = renderCreateForm(users, preStatus);
    document.getElementById('overlay').classList.add('show');
    document.getElementById('panel').classList.add('open');
    document.getElementById('fieldName')?.focus();
  }

  function renderCreateForm(users, preStatus = '') {
    // Store workspace users for ID lookup on submit
    state.workspaceUsers = users;
    const assigneePicker = peoplePicker([], 'create-pp');

    return `
      <form id="createForm" onsubmit="submitNewTask(event)" autocomplete="off">
        <div class="form-field">
          <label class="form-label" for="fieldName">Task Name *</label>
          <input id="fieldName" name="name" class="form-input" type="text" required
            placeholder="e.g. Review COGS sheet">
        </div>
        <div class="form-field">
          <label class="form-label">Assignee</label>
          ${assigneePicker}
        </div>
        <div class="form-field">
          <label class="form-label" for="fieldDue">Due Date</label>
          <input id="fieldDue" name="dueDate" class="form-input" type="date">

  async function submitNewTask(e) {
    e.preventDefault();
    const form = document.getElementById('createForm');
    const btn  = document.getElementById('createSubmitBtn');
    const errEl = document.getElementById('createError');

    const data = Object.fromEntries(new FormData(form));
    // Strip empty strings so the backend skips optional fields
    Object.keys(data).forEach(k => { if (!data[k]) delete data[k]; });

    // Replace single assignee with multi-select picker
    delete data.assigneeId;
    delete data.assigneeName;
    const selectedNames = getPickerSelections('create-pp');
    const assigneeIds = selectedNames
      .map(name => (state.workspaceUsers || []).find(u => u.name?.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(u.name?.toLowerCase())))
      .filter(Boolean)
      .map(u => u.id);
    if (assigneeIds.length) data.assigneeIds = assigneeIds;
    if (selectedNames.length) data.assigneeNames = selectedNames;

    btn.disabled = true;
    btn.textContent = 'Creating…';
    errEl.style.display = 'none';

    try {
      const res = await fetch('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'Failed to create task');

      closePanel();
      // Prepend the new task to local state immediately, then background-refresh
      state.tasks.unshift(result.task);
      render();
      fetchAll(); // sync the full list from Notion in the background
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create Task';
    }
  }

  // ── Toggle done / archive ──────────────────────────────────────────────────
  async function toggleDone(taskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    const completedAt = new Date().toISOString();
    const archived = {
      id: task.id, name: task.name,
      assignee: task.assignees?.[0] || '',
      category: task.category || '',
      dueDate: task.dueDate || null,
      completedAt, status: 'Done',
    };

    // Optimistic: remove from active list, add to archive
    state.tasks = state.tasks.filter(t => t.id !== taskId);
    state.archive.unshift(archived);
    render();

    try {
      await Promise.all([
        fetch(`/tasks/${taskId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'Done' }) }),
        fetch(`/archive/${taskId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(archived) }),
      ]);
    } catch (err) {
      // Rollback
      state.archive = state.archive.filter(t => t.id !== taskId);
      state.tasks.unshift(task);
      render();
      console.error('[taskr] toggleDone failed:', err.message);
    }
  }

  async function restoreTask(taskId) {
    const archived = state.archive.find(t => t.id === taskId);
    if (!archived) return;

    const btn = document.getElementById(`restore-${taskId}`);
    if (btn) { btn.disabled = true; btn.textContent = 'Restoring…'; }

    // Optimistic: remove from archive, add back to tasks
    state.archive = state.archive.filter(t => t.id !== taskId);
    state.tasks.unshift({
      id: archived.id, name: archived.name,
      assignees: archived.assignee ? [archived.assignee] : [],
      category: archived.category || null,
      dueDate: archived.dueDate || null,
      status: 'To do', priority: null,
      lastEdited: new Date().toISOString(),
    });
    render();

    try {
      await fetch(`/archive/${taskId}`, { method: 'DELETE' });
    } catch (err) {
      // Rollback
      state.tasks = state.tasks.filter(t => t.id !== taskId);
      state.archive.unshift(archived);
      render();
      console.error('[taskr] restoreTask failed:', err.message);
    }
  }

  // ── Save task ──────────────────────────────────────────────────────────────
  async function saveTask() {
    const taskId = panelTaskId;
    if (!taskId) return;
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    const name      = document.getElementById('edit_name')?.value.trim();
    const status    = document.getElementById('edit_status')?.value || null;
    const dueDate   = document.getElementById('edit_dueDate')?.value || null;
    const priority  = document.getElementById('edit_priority')?.value || null;
    const category  = document.getElementById('edit_category')?.value || null;

    // Map selected names to Notion user IDs where possible
    const selectedNames = getPickerSelections('panel-pp');
    const assigneeIds = selectedNames
      .map(name => state.workspaceUsers?.find(u => u.name?.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(u.name?.toLowerCase())))
      .filter(Boolean)
      .map(u => u.id);

    // Extras for Telegram notifications on the backend
    const previousValues = {
      name:      task.name,
      status:    task.status,
      dueDate:   task.dueDate,
      priority:  task.priority,
      category:  task.category,
      assignees: state.tasksMeta[taskId]?.assignees || task.assignees || [],
    };

    const body = { status, dueDate, priority, category, assigneeIds, assigneeNames: selectedNames, taskName: task.name, previousValues };
    if (name) body.name = name;

    const btn = document.getElementById('saveBtn');
    const errEl = document.getElementById('saveError');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    if (errEl) errEl.style.display = 'none';

    try {
      const res = await fetch(`/tasks/${taskId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'Save failed');

      if (name) task.name = name;
      if (status !== undefined) task.status = status;
      if (dueDate !== undefined) task.dueDate = dueDate;
      if (priority !== undefined) task.priority = priority;
      if (category !== undefined) task.category = category;
      task.assignees = selectedNames;

      // Persist assignees in meta so table/kanban display stays in sync
      if (!state.tasksMeta[taskId]) state.tasksMeta[taskId] = { notes: '', sop: '', sopLink: '', resources: [], assignees: [] };
      state.tasksMeta[taskId].assignees = selectedNames;
      fetch(`/tasks-meta/${taskId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ assignees: selectedNames }),
      }).catch(() => {});

      document.getElementById('panelTitle').textContent = task.name;
      btn.textContent = '✓ Saved';
      btn.style.background = '#34c759';
      btn.disabled = false;
      setTimeout(() => { btn.textContent = 'Save'; btn.style.background = ''; }, 2000);
      render();
    } catch (err) {
      btn.textContent = 'Save';
      btn.disabled = false;
      if (errEl) { errEl.textContent = err.message; errEl.style.display = 'block'; }
    }
  }

  const FREQ_LABELS = {
    daily:    'Daily',
    weekday:  'Weekday',
    weekly:   'Weekly',
    biweekly: 'Biweekly',
    monthly:  'Monthly',
  };
  const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function freqLabel(rt) {
    if (rt.frequency === 'custom') return `Every ${rt.customDays || '?'} days`;
    return FREQ_LABELS[rt.frequency] || rt.frequency;
  }

  function nextDueDateStr(rt) {
    const today = new Date().toISOString().split('T')[0];
    if (!rt.lastCreated && rt.startDate >= today) return `Starts ${fmtDate(rt.startDate)}`;
    const base = new Date(rt.lastCreated || rt.startDate);
    let next = new Date(base);
    switch (rt.frequency) {
      case 'daily':    next.setDate(next.getDate() + 1); break;
      case 'weekday':  next.setDate(next.getDate() + 1);
                       while ([0,6].includes(next.getDay())) next.setDate(next.getDate() + 1);
                       break;
      case 'weekly':   next.setDate(next.getDate() + 7); break;
      case 'biweekly': next.setDate(next.getDate() + 14); break;
      case 'monthly':  next = new Date(base); next.setMonth(next.getMonth() + 1);
                       if (rt.dayOfMonth) next.setDate(rt.dayOfMonth); break;
      case 'custom':   next.setDate(next.getDate() + (rt.customDays || 1)); break;
      default: return '—';
    }
    const ns = next.toISOString().split('T')[0];
    return `Next: ${ns === today ? 'Today' : fmtDate(ns)}`;
  }
