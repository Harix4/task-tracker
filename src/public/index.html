  function _setupHtml3() {
    const link = _setupBot
      ? `<a class="setup-tg-link" href="https://t.me/${esc(_setupBot)}" target="_blank">@${esc(_setupBot)}</a>`
      : `your Taskr bot`;
    return `
      ${_setupDots(3)}
      <div class="setup-title">Get Telegram reminders</div>
      <div class="setup-sub">Receive personal task reminders directly in your DMs.</div>
      <div class="setup-tg-card">
        <div class="setup-tg-num">1</div>
        <div class="setup-tg-text">Open ${link} on Telegram</div>
      </div>
      <div class="setup-tg-card">
        <div class="setup-tg-num">2</div>
        <div class="setup-tg-text">Send the message <strong>/register</strong></div>
      </div>
      <div class="setup-tg-card">
        <div class="setup-tg-num">3</div>
        <div class="setup-tg-text">You'll receive task reminders as private DMs in your timezone</div>
      </div>
      <button class="setup-btn" onclick="_setupFinish()">✓ I've done this</button>
      <button class="setup-btn-ghost" onclick="_setupFinish()">Skip for now</button>`;
  }

  function _setupDetect() {
    _setupTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const sel = document.getElementById('setupTzSel');
    if (sel) sel.value = _setupTz;
    _updateSetupClock();
  }

  function _setupTzChange(val) {
    _setupTz = val;
    _updateSetupClock();
  }

  function _startSetupClock() {
    _updateSetupClock();
    _setupClock = setInterval(_updateSetupClock, 1000);
  }

  function _updateSetupClock() {
    const el = document.getElementById('setupClock');
    const lb = document.getElementById('setupTzLabel');
    const tz = _setupTz || 'UTC';
    if (!el) return;
    try {
      el.textContent = new Date().toLocaleTimeString('en-US', {
        timeZone: tz, hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true,
      });
      if (lb) lb.textContent = tz.replace(/_/g, ' ');
    } catch { el.textContent = '—'; }
  }

  function _setupNext() {
    _setupStep++;
    _renderSetup();
  }

  async function _setupFinish() {
    if (_setupClock) { clearInterval(_setupClock); _setupClock = null; }
    try {
      await authFetch('/auth/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ timezone: _setupTz }),
      });
      localStorage.setItem(TZ_KEY, _setupTz);
      localStorage.setItem(SETUP_DONE_KEY, '1');
    } catch (err) {
      console.error('[setup] save failed:', err.message);
    }
    document.getElementById('setupScreen').style.display = 'none';
    showApp();
    renderNav();
    renderSidebarUser();
    await fetchAll();
  }

  // ── Custom date picker ────────────────────────────────────────────────────
  const DP = {
    _state: null, // { wid, iid, year, month, val }
    _MONTHS: ['January','February','March','April','May','June','July','August','September','October','November','December'],
    _DAYS:   ['Su','Mo','Tu','We','Th','Fr','Sa'],

    // Generate full picker field HTML (used inside template strings)
    field(iid, val, fieldName = '') {
      const wid  = 'dpw_' + iid;
      const d    = val ? new Date(val + 'T12:00:00') : null;
      const today = new Date();
      const yr   = d ? d.getFullYear()  : today.getFullYear();
      const mo   = d ? d.getMonth()     : today.getMonth();
      const disp = val ? fmtDate(val) : '';
      const nm   = fieldName ? ` name="${esc(fieldName)}"` : '';
      return `<div id="${wid}" class="datepicker-wrap">
        <input type="hidden" id="${iid}"${nm} value="${esc(val||'')}">
        ${DP._btn(wid, iid, yr, mo, val||'')}
      </div>`;
    },

    _btn(wid, iid, yr, mo, val) {
      const disp = val ? fmtDate(val) : '';
      return `<button type="button" class="datepicker-btn${!disp ? ' dp-ph' : ''}"
        onclick="DP.open('${wid}','${iid}',${yr},${mo},'${val}');event.stopPropagation()">
        <span>${disp || 'Select date'}</span>
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="0.5" y="1.5" width="12" height="10.5" rx="1.5"/>
          <path d="M0.5 5h12M4 0.5v2M9 0.5v2"/>
        </svg>
      </button>`;
    },

    open(wid, iid, yr, mo, val) {
      // Close any other open picker first
      if (DP._state && DP._state.wid !== wid) DP._close();
      DP._state = { wid, iid, yr, mo, val };
      const wrap = document.getElementById(wid);
      if (!wrap) return;
      wrap.querySelector('.datepicker-cal')?.remove();
      const tmp = document.createElement('div');
      tmp.innerHTML = DP._cal(wid, iid, yr, mo, val);
      wrap.appendChild(tmp.firstElementChild);
    },

    nav(wid, iid, yr, mo, val, e) {
      e?.stopPropagation();
      DP._state = { wid, iid, yr, mo, val };
      const wrap = document.getElementById(wid);
      if (!wrap) return;
      wrap.querySelector('.datepicker-cal')?.remove();
      const tmp = document.createElement('div');
      tmp.innerHTML = DP._cal(wid, iid, yr, mo, val);
      wrap.appendChild(tmp.firstElementChild);
    },

    select(wid, iid, dateStr, yr, mo, e) {
      e?.stopPropagation();
      const hidden = document.getElementById(iid);
      if (hidden) hidden.value = dateStr;
      DP._state = null;
      const wrap = document.getElementById(wid);
      if (wrap) {
        wrap.querySelector('.datepicker-cal')?.remove();
        const btn = wrap.querySelector('.datepicker-btn');
        if (btn) btn.outerHTML = DP._btn(wid, iid, yr, mo, dateStr);
        // Re-fetch btn since we replaced it
        const newBtn = wrap.querySelector('.datepicker-btn');
        if (newBtn) newBtn.classList.toggle('dp-ph', !dateStr);
        // Update displayed text
        const span = wrap.querySelector('.datepicker-btn span');
        if (span) span.textContent = dateStr ? fmtDate(dateStr) : 'Select date';
      }
    },

    _close() {
      if (!DP._state) return;
      const wrap = document.getElementById(DP._state.wid);
      wrap?.querySelector('.datepicker-cal')?.remove();
      DP._state = null;
    },

    _cal(wid, iid, yr, mo, sel) {
      const today = new Date();
      const ts = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const firstDow  = new Date(yr, mo, 1).getDay();
      const lastDay   = new Date(yr, mo + 1, 0).getDate();
      const pm = mo === 0  ? { y: yr-1, m: 11 } : { y: yr, m: mo-1 };
      const nm = mo === 11 ? { y: yr+1, m: 0  } : { y: yr, m: mo+1 };

      let cells = '';
      for (let i = 0; i < firstDow; i++) cells += `<div class="dp-day dp-empty"></div>`;
      for (let d = 1; d <= lastDay; d++) {
        const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        cells += `<button type="button" class="dp-day${ds===ts?' dp-today':''}${ds===sel?' dp-sel':''}"
          onclick="DP.select('${wid}','${iid}','${ds}',${yr},${mo},event)">${d}</button>`;
      }

      return `<div class="datepicker-cal">
        <div class="dp-header">
          <button type="button" class="dp-nav"
            onclick="DP.nav('${wid}','${iid}',${pm.y},${pm.m},'${sel}',event)">‹</button>
          <span class="dp-month">${DP._MONTHS[mo]} ${yr}</span>
          <button type="button" class="dp-nav"
            onclick="DP.nav('${wid}','${iid}',${nm.y},${nm.m},'${sel}',event)">›</button>
        </div>
        <div class="dp-grid">
          ${DP._DAYS.map(d => `<div class="dp-dow">${d}</div>`).join('')}
          ${cells}
        </div>
        ${sel ? `<button type="button" class="dp-clear"
          onclick="DP.select('${wid}','${iid}','',${yr},${mo},event)">Clear date</button>` : ''}
      </div>`;
    },
  };

  // Close calendar on outside click
  document.addEventListener('click', () => { if (DP._state) DP._close(); });

  // ── Timezone ──────────────────────────────────────────────────────────────
  const TZ_KEY = 'taskr_tz';
  function getUserTz() { return localStorage.getItem(TZ_KEY) || Intl.DateTimeFormat().resolvedOptions().timeZone; }

  // ── Progress dot ──────────────────────────────────────────────────────────
  function progressDot(status) {
    const s = status || 'To do';
    if (s === 'To do')
      return `<svg class="progress-dot" width="11" height="11" viewBox="0 0 11 11"><circle cx="5.5" cy="5.5" r="4.5" fill="none" stroke="#636366" stroke-width="1.4"/></svg>`;
    if (s === 'In progress')
      return `<svg class="progress-dot" width="11" height="11" viewBox="0 0 11 11"><circle cx="5.5" cy="5.5" r="4.5" fill="none" stroke="rgba(0,113,227,.3)" stroke-width="1.4"/><path d="M5.5 1A4.5 4.5 0 1 1 1 5.5" stroke="#0071e3" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>`;
    if (s === 'In review')
      return `<svg class="progress-dot" width="11" height="11" viewBox="0 0 11 11"><circle cx="5.5" cy="5.5" r="4.5" fill="none" stroke="#ff9500" stroke-width="1.4"/><circle cx="5.5" cy="5.5" r="2" fill="#ff9500"/></svg>`;
    if (s === 'Done')
      return `<svg class="progress-dot" width="11" height="11" viewBox="0 0 11 11"><circle cx="5.5" cy="5.5" r="4.5" fill="#34c759"/><path d="M3 5.5l2 2 3-3.5" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    if (s === 'Blocked')
      return `<svg class="progress-dot" width="11" height="11" viewBox="0 0 11 11"><circle cx="5.5" cy="5.5" r="4.5" fill="none" stroke="#ff3b30" stroke-width="1.4"/><path d="M3.5 3.5l4 4M7.5 3.5l-4 4" stroke="#ff3b30" stroke-width="1.3" stroke-linecap="round"/></svg>`;
    return '';
  }

  // ── Relative due date label ────────────────────────────────────────────────
  function dueDateRel(d) {
    if (!d) return `<span style="color:var(--muted)">—</span>`;
    const today = todayStr();
    const next  = (() => { const t = new Date(); t.setDate(t.getDate()+1); return t.toISOString().split('T')[0]; })();
    if (d === today) return `<span class="dd-today">Today</span>`;
    if (d === next)  return `<span class="dd-tomorrow">Tomorrow</span>`;
    const diff = Math.round((new Date(d+'T12:00:00') - new Date(today+'T12:00:00')) / 86400000);
    if (diff > 0) return `<span class="dd-soon">${diff}d</span>`;
    const abs = Math.abs(diff);
    return `<span class="dd-overdue">${abs}d ago</span>`;
  }

  // ── Bulk select ────────────────────────────────────────────────────────────
  function toggleTaskSelect(taskId, checked) {
    if (checked) state.selectedTasks.add(taskId);
    else         state.selectedTasks.delete(taskId);
    updateBulkBar();
    // Sync header checkbox
    const all = document.querySelectorAll('.task-bulk-cb[data-id]');
    const hdr = document.getElementById('selectAllCb');
    if (hdr) hdr.indeterminate = state.selectedTasks.size > 0 && state.selectedTasks.size < all.length;
    if (hdr) hdr.checked = all.length > 0 && state.selectedTasks.size === all.length;
  }

  function toggleSelectAll(checked) {
    document.querySelectorAll('.task-bulk-cb[data-id]').forEach(cb => {
      cb.checked = checked;
      if (checked) state.selectedTasks.add(cb.dataset.id);
      else         state.selectedTasks.delete(cb.dataset.id);
    });
    updateBulkBar();
  }

  function updateBulkBar() {
    const bar = document.getElementById('bulkBar');
    const cnt = document.getElementById('bulkCount');
    const n   = state.selectedTasks.size;
    if (bar) bar.classList.toggle('show', n > 0);
    if (cnt) cnt.textContent = `${n} task${n !== 1 ? 's' : ''} selected`;
  }

  function clearSelection() {
    state.selectedTasks.clear();
    document.querySelectorAll('.task-bulk-cb').forEach(cb => cb.checked = false);
    const hdr = document.getElementById('selectAllCb');
    if (hdr) { hdr.checked = false; hdr.indeterminate = false; }
    updateBulkBar();
  }

  async function bulkMarkDone() {
    const ids = [...state.selectedTasks];
    clearSelection();
    for (const id of ids) await toggleDone(id);
  }

  async function bulkDelete() {
    if (!confirm(`Delete ${state.selectedTasks.size} tasks? This cannot be undone.`)) return;
    const ids = [...state.selectedTasks];
    clearSelection();
    for (const id of ids) {
      state.tasks = state.tasks.filter(t => t.id !== id);
      authFetch(`/tasks/${id}`, { method: 'DELETE' }).catch(console.error);
    }
    render();
  }

  // ── Keyboard shortcuts ─────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    // Hide hint once user interacts
    document.getElementById('kbdHint')?.classList.add('hidden');

    const inField = ['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName) || e.target.isContentEditable;
    if (inField && e.key !== 'Escape') return;

    if (e.key === 'Escape') {
      closePanel();
      clearSelection();
      return;
    }
    if (inField) return;

    if ((e.key === 'n' || e.key === 'N') && !e.metaKey && !e.ctrlKey) {
      e.preventDefault();
      if (state.user?.role === 'admin' || true) openCreatePanel();
    }
    if (e.key === '/' && !e.metaKey && !e.ctrlKey) {
      e.preventDefault();
      const s = document.querySelector('.search-input');
      if (s) { s.focus(); s.select(); }
    }
  });

  // Show hint briefly on load
  setTimeout(() => {
    const h = document.getElementById('kbdHint');
    if (h) { h.classList.remove('hidden'); setTimeout(() => h.classList.add('hidden'), 4000); }
  }, 2000);

  // ── Mobile swipe gestures ──────────────────────────────────────────────────
  let _swipeRow = null, _swipeX0 = 0, _swipeDx = 0;

  document.addEventListener('touchstart', e => {
    const row = e.target.closest('tr[data-id]');
    if (!row) return;
    _swipeRow = row;
    _swipeX0  = e.touches[0].clientX;
    _swipeDx  = 0;
    row.style.transition = 'none';
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!_swipeRow) return;
    _swipeDx = e.touches[0].clientX - _swipeX0;
    if (_swipeDx < -8) {
      e.preventDefault();
      const clamped = Math.max(_swipeDx, -144);
      _swipeRow.style.transform = `translateX(${clamped}px)`;
    } else if (_swipeDx > 8) {
      _swipeRow.style.transform = '';
    }
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (!_swipeRow) return;
    const row = _swipeRow;
    _swipeRow = null;
    row.style.transition = 'transform 0.22s ease';
    if (_swipeDx < -72) {
      row.style.transform = 'translateX(-144px)';
      row.dataset.swiped  = '1';
      _showSwipeActions(row);
    } else {
      row.style.transform = '';
      row.dataset.swiped  = '';
      _hideSwipeActions(row);
    }
  });

  function _showSwipeActions(row) {
    _hideSwipeActions(row);
    const taskId = row.dataset.id;
    const wrap = document.createElement('div');
    wrap.className = 'swipe-actions';
    wrap.style.transform = 'translateX(0)';
    wrap.innerHTML = `
      <button class="swipe-btn sb-done" onclick="_swipeDone('${esc(taskId)}')">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9l4.5 4.5L15 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Done
      </button>
      <button class="swipe-btn sb-delete" onclick="_swipeDelete('${esc(taskId)}')">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 6h10M7 6V4h4v2M8 10v4M10 10v4" stroke="white" stroke-width="1.7" stroke-linecap="round"/></svg>
        Delete
      </button>`;
    row.parentElement?.appendChild(wrap);
    // Position behind the row
    const rect = row.getBoundingClientRect();
    wrap.style.cssText = `position:fixed;right:0;top:${rect.top}px;height:${rect.height}px;display:flex;align-items:stretch;z-index:50`;
  }

  function _hideSwipeActions(row) {
    const table = row.closest('table');
    table?.querySelectorAll('.swipe-actions').forEach(el => el.remove());
  }

  function _swipeDone(id) {
    const row = document.querySelector(`tr[data-id="${id}"]`);
    if (row) { row.style.transform = ''; row.dataset.swiped = ''; _hideSwipeActions(row); }
    toggleDone(id);
  }

  function _swipeDelete(id) {
    const row = document.querySelector(`tr[data-id="${id}"]`);
    if (row) { row.style.transform = ''; _hideSwipeActions(row); }
    state.tasks = state.tasks.filter(t => t.id !== id);
    render();
    authFetch(`/tasks/${id}`, { method: 'DELETE' }).catch(console.error);
  }

  // Close swipe on outside tap
  document.addEventListener('touchstart', e => {
    if (!e.target.closest('tr[data-id]') && !e.target.closest('.swipe-actions')) {
      document.querySelectorAll('tr[data-swiped="1"]').forEach(row => {
        row.style.transform = '';
        row.dataset.swiped  = '';
        _hideSwipeActions(row);
      });
    }
  }, { passive: true });

  const INTERVAL_LABELS = {
    '10min': '10 min', '30min': '30 min',
    '1hr': '1 hr', '2hr': '2 hr', '4hr': '4 hr', '6hr': '6 hr', '8hr': '8 hr',
  };
  const REMINDER_OPTIONS = [
    ['10min','10 min'],['30min','30 min'],['1hr','1 hr'],
    ['2hr','2 hr'],['4hr','4 hr'],['6hr','6 hr'],['8hr','8 hr'],
  ];

  // ── Utils ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m - 1];
    return `${mon} ${+day}, ${y}`;
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function weekStartStr() {
    const d = new Date();
    const dow = d.getDay();
    d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function daysAgo(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr + 'T00:00:00');
    return Math.floor((today - d) / 86400000);
  }

  function initials(name) {
    if (!name) return '?';
    const p = name.trim().split(/\s+/);
    return p.length >= 2 ? (p[0][0] + p[1][0]).toUpperCase() : p[0].slice(0,2).toUpperCase();
  }

  function firstName(name) {
    return name?.trim().split(/\s+/)[0] || 'Unknown';
  }

  const COLORS = ['#0071e3','#34c759','#ff9500','#bf5af2','#ff375f','#5ac8fa','#30d158'];
  function avatarColor(name) {
    let h = 0;
    for (let i = 0; i < (name||'').length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function avatarHtml(name, size = 30) {
    const c = avatarColor(name || '?');
    const fs = Math.floor(size * 0.38);
    return `<div class="avatar" style="width:${size}px;height:${size}px;background:${c};font-size:${fs}px">${esc(initials(name||'?'))}</div>`;
  }

  // Overlapping avatar stack for multi-assignee display
  function avatarStackHtml(names, size = 22) {
    if (!names || names.length === 0) {
      return `<div class="td-assignee">${avatarHtml('?', size)}<span style="font-size:13px;color:var(--muted)">Unassigned</span></div>`;
    }
    const shown = names.slice(0, 3);
    const overflow = names.length - 3;
    const fs = Math.floor(size * 0.38);
    return `<div class="av-stack" title="${esc(names.join(', '))}">
      ${shown.map(n => `<div class="av" style="width:${size}px;height:${size}px;background:${avatarColor(n)};font-size:${fs}px">${esc(initials(n))}</div>`).join('')}
      ${overflow > 0 ? `<div class="av av-overflow" style="width:${size}px;height:${size}px;font-size:${fs}px">+${overflow}</div>` : ''}
    </div>`;
  }

  // People picker HTML (multi-select pills)
  function peoplePicker(selectedNames = [], pickerId = 'pp', taskId = null) {
    const taskArg = taskId ? `,'${esc(taskId)}'` : '';
    return `<div class="people-picker" id="${esc(pickerId)}">
      ${TEAM.map(name => {
        const sel = selectedNames.includes(name);
        const c = avatarColor(name);
        return `<button type="button" class="person-pill${sel ? ' pp-selected' : ''}"
          onclick="togglePersonPill('${esc(pickerId)}','${esc(name)}'${taskArg})"
          data-name="${esc(name)}">
          <span class="pp-avatar" style="background:${c}">${esc(initials(name))}</span>
          ${esc(name)}${sel ? '<span class="pp-check">✓</span>' : ''}
        </button>`;
      }).join('')}
    </div>`;
  }

  function togglePersonPill(pickerId, name, taskId = null) {
    const container = document.getElementById(pickerId);
    if (!container) return;
    const pill = Array.from(container.querySelectorAll('.person-pill')).find(p => p.dataset.name === name);
    if (!pill) return;
    const isSelected = pill.classList.toggle('pp-selected');
    let check = pill.querySelector('.pp-check');
    if (isSelected && !check) {
      check = document.createElement('span');
      check.className = 'pp-check';
      check.textContent = '✓';
      pill.appendChild(check);
    } else if (!isSelected && check) {
      check.remove();
    }
    if (taskId) scheduleMetaSave(taskId);
  }

  function getPickerSelections(pickerId) {
    const container = document.getElementById(pickerId);
    if (!container) return [];
    return Array.from(container.querySelectorAll('.person-pill.pp-selected')).map(p => p.dataset.name);
  }

  function catPill(cat) {
    if (!cat) return '';
    const cls = {Ads:'pill-ads',Fulfillment:'pill-fulfillment',Creative:'pill-creative',Finance:'pill-finance',Operations:'pill-operations'}[cat] || '';
    return `<span class="pill ${cls}">${esc(cat)}</span>`;
  }

  const STATUS_ICONS = {
    'To do':       `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.4"/></svg>`,
    'In progress': `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.4"/><path d="M5 3v2.5l1.5 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
    'In review':   `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5a3.5 3.5 0 107 0 3.5 3.5 0 00-7 0z" stroke="currentColor" stroke-width="1.3"/><circle cx="5" cy="5" r="1" fill="currentColor"/></svg>`,
    'Done':        `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.4"/><path d="M3 5l1.5 1.5L7 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    'Blocked':     `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.4"/><path d="M3.5 3.5l3 3M6.5 3.5l-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`,
  };

  function statusPill(s) {
    if (!s) return '';
    const cls  = {'To do':'s-not-started','In progress':'s-in-progress','In review':'s-in-review','Done':'s-complete','Blocked':'s-blocked'}[s] || 's-not-started';
    const icon = STATUS_ICONS[s] || '';
    return `<span class="status-pill ${cls}" style="gap:5px;display:inline-flex;align-items:center">${icon}${esc(s)}</span>`;
  }

  function prioHtml(p) {
    if (!p) return `<span style="color:var(--muted)">—</span>`;
    const lower = p.toLowerCase();
    const cls = lower.includes('high') ? 'p-high' : lower.includes('medium') ? 'p-medium' : lower.includes('low') ? 'p-low' : '';
    const label = p.replace(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}️‍\s]+/u, '').trim() || p;
    return `<div style="display:flex;align-items:center;gap:6px"><div class="p-dot ${cls}"></div><span style="font-size:13px;color:var(--text)">${esc(label)}</span></div>`;
  }

  function fmtDateTime(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function dueDateHtml(d) {
    if (!d) return `<span style="color:var(--muted)">—</span>`;
    const today = todayStr();
    const over = d < today, now = d === today;
    const style = over ? 'color:var(--red);font-weight:600' : now ? 'color:var(--orange);font-weight:600' : '';
    return `<span style="${style}">${esc(fmtDate(d))}</span>`;
  }

  // ── Data fetching ──────────────────────────────────────────────────────────
  async function fetchAll() {
    try {
      const [tr, pr, ar, rr, mr, rcr, ptr] = await Promise.all([
        authFetch('/tasks').then(r => r.ok ? r.json() : null).catch(() => null),
        authFetch('/performance').then(r => r.ok ? r.json() : null).catch(() => null),
        authFetch('/archive').then(r => r.ok ? r.json() : null).catch(() => null),
        authFetch('/resources').then(r => r.ok ? r.json() : null).catch(() => null),
        authFetch('/tasks-meta').then(r => r.ok ? r.json() : null).catch(() => null),
        authFetch('/recurring').then(r => r.ok ? r.json() : null).catch(() => null),
        authFetch('/personal/tasks').then(r => r.ok ? r.json() : null).catch(() => null),
      ]);
      if (tr?.tasks) {
        const all = tr.tasks.filter(t => t.status !== 'Done');
        // Members see ONLY tasks explicitly assigned to them
        if (state.user?.role === 'member') {
          const me = state.user.username;
          state.tasks = all.filter(t => (t.assignees || []).includes(me));
        } else {
          state.tasks = all;
        }
      }
      if (pr?.members)    state.perf          = pr;
      if (ar?.tasks)      state.archive        = ar.tasks;
      if (rr?.resources)  state.resources      = rr.resources;
      if (mr?.meta)       state.tasksMeta      = mr.meta;
      if (rcr?.recurring) state.recurring      = rcr.recurring;
      if (ptr?.tasks)     state.personalTasks  = ptr.tasks;
      flashDot();
    } catch (e) {
      console.warn('[taskr] fetch error:', e.message);
    }
    render();
  }

  function flashDot() {
    const dot = document.getElementById('refreshDot');
    if (!dot) return;
    dot.classList.remove('pulse');
    void dot.offsetWidth;
    dot.classList.add('pulse');
    setTimeout(() => dot.classList.remove('pulse'), 900);
  }

  // ── Navigation ─────────────────────────────────────────────────────────────
  function navigate(page) {
    // Role protection: members can't see Performance
    if (page === 'performance' && state.user?.role !== 'admin') {
      page = 'dashboard';
    }
    // Always land on list view when navigating to tasks — board is opt-in via the toggle
    if (page === 'tasks') state.viewMode = 'table';
    state.page = page;
    state.filter = { status: 'All', search: '', category: '' };
    renderNav();
    closePanel();
    render();
  }

  // ── Panel ──────────────────────────────────────────────────────────────────
  let panelTaskId = null;
  let panelActiveTab = 'notes';
  let metaSaveTimer = null;

  async function openPanel(taskId, focusField = null) {
    panelTaskId = taskId;
    panelActiveTab = 'notes';
    clearTimeout(metaSaveTimer);
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    document.getElementById('panelTitle').textContent = task.name;
    document.getElementById('panelBody').innerHTML = '<div class="empty" style="padding:32px"><div class="empty-icon">⏳</div>Loading…</div>';
    document.getElementById('overlay').classList.add('show');
    document.getElementById('panel').classList.add('open');

    const [ur, rr] = await Promise.all([
      authFetch('/users').then(r => r.ok ? r.json() : null).catch(() => null),
      authFetch('/reminders').then(r => r.ok ? r.json() : null).catch(() => null),
    ]);
    if (panelTaskId !== taskId) return; // panel was reopened for a different task
    const users = ur?.users || [];
    state.workspaceUsers = users;
    const activeReminder = (rr?.reminders || []).find(r => r.taskId === taskId) || null;

    document.getElementById('panelBody').innerHTML = panelContent(task, users, activeReminder);

    if (focusField) {
      setTimeout(() => {
        const el = document.getElementById(`edit_${focusField}`);
        if (el) { el.focus(); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      }, 60);
    }
  }

  function closePanel() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('panel').classList.remove('open');
  }

  function panelContent(t, users = [], activeReminder = null) {
    const edited = t.lastEdited
      ? new Date(t.lastEdited).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
      : '—';

    const metaAssignees = (state.tasksMeta[t.id]?.assignees?.length)
      ? state.tasksMeta[t.id].assignees
      : (t.assignees || []);
    const assigneeField = peoplePicker(metaAssignees, 'panel-pp', t.id);

    const meta = state.tasksMeta[t.id] || { notes: '', sop: '', sopLink: '', resources: [] };
    const hasNotes = !!(meta.notes?.trim());
    const hasSop   = !!(meta.sop?.trim() || meta.sopLink?.trim());
    const hasRes   = !!(meta.resources?.length);

    const today = new Date().toISOString().split('T')[0];
    const isOverdue = !!(t.dueDate && t.dueDate < today && t.status !== 'Done');
    const overdueWarning = isOverdue && !activeReminder
      ? `<div class="rem-overdue-warning">⚠️ This task is overdue. Reminders will send overdue alerts instead of regular reminders.</div>`
      : '';

    const reminderSection = activeReminder
      ? `<div class="reminder-active-pill">
           ⏰ Reminding every ${INTERVAL_LABELS[activeReminder.intervalKey] || activeReminder.intervalKey}
           <button type="button" class="reminder-cancel-btn" onclick="cancelReminderForTask('${esc(t.id)}')">×</button>
         </div>`
      : `<div class="rem-pills">
           ${REMINDER_OPTIONS.map(([key, label]) =>
             `<button type="button" class="rem-pill" onclick="setReminderForTask('${esc(t.id)}','${esc(t.name)}','${key}')">${label}</button>`
           ).join('')}
         </div>${overdueWarning}`;

    return `
      <div class="form-field">
        <label class="form-label" for="edit_name">Task Name</label>
        <input id="edit_name" class="form-input" type="text" value="${esc(t.name)}" placeholder="Task name">
      </div>
      <div class="form-field">
        <div class="form-label">Status</div>
        <input type="hidden" id="edit_status" value="${esc(t.status || '')}">
        <div class="status-seg">
          ${[['To do','s-todo'],['In progress','s-progress'],['In review','s-review'],['Done','s-done'],['Blocked','s-blocked']].map(([s,cls]) =>
            `<button type="button" class="status-seg-btn ${cls}${t.status === s ? ' seg-active' : ''}" data-s="${esc(s)}" onclick="panelSetStatus('${esc(s)}')">${s}</button>`
          ).join('')}
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Assignee</label>
        ${assigneeField}
      </div>
      <div class="form-field">
        <label class="form-label" for="edit_dueDate">Due Date</label>
        ${DP.field('edit_dueDate', t.dueDate || '')}
      </div>
      <div class="form-field">
        <label class="form-label" for="edit_priority">Priority</label>
        <select id="edit_priority" class="form-input">
          <option value="">—</option>
          ${['🔴 High','🟡 Medium','🟢 Low'].map(p => {

  function setFilter(key, val) {

    render();
    if (wasFocused) {

  // ── Metrics ────────────────────────────────────────────────────────────────
  function computeMetrics() {
    const today = todayStr(), wStart = weekStartStr();
    const named     = state.tasks.filter(t => t.name?.trim());
    const dueToday  = named.filter(t => t.dueDate === today && t.status !== 'Done');
    const overdue   = named.filter(t => t.dueDate && t.dueDate < today && t.status !== 'Done');
    const doneWeek  = named.filter(t => t.status === 'Done' && t.dueDate >= wStart && t.dueDate <= today);
    const ms = state.perf.members || [];
    const totA = ms.reduce((s,m) => s + m.assigned, 0);
    const totC = ms.reduce((s,m) => s + m.completed, 0);
    const teamRate = totA > 0 ? Math.round((totC / totA) * 100) : 0;
    return { dueToday, overdue, doneWeek, teamRate };
  }

  async function submitNewTask(e) {
    e.preventDefault();
    const form = document.getElementById('createForm');
    const btn  = document.getElementById('createSubmitBtn');
    const errEl = document.getElementById('createError');

    const data = Object.fromEntries(new FormData(form));
    // Strip empty strings so the backend skips optional fields
    Object.keys(data).forEach(k => { if (!data[k]) delete data[k]; });

    // Replace single assignee with multi-select picker
    delete data.assigneeId;
    delete data.assigneeName;
    const selectedNames = getPickerSelections('create-pp');
    const assigneeIds = selectedNames
      .map(name => (state.workspaceUsers || []).find(u => u.name?.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(u.name?.toLowerCase())))
      .filter(Boolean)
      .map(u => u.id);
    if (assigneeIds.length) data.assigneeIds = assigneeIds;
    if (selectedNames.length) data.assigneeNames = selectedNames;

    btn.disabled = true;
    btn.textContent = 'Creating…';
    errEl.style.display = 'none';

    try {
      const res = await authFetch('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'Failed to create task');

      closePanel();
      // Prepend the new task to local state immediately, then background-refresh
      state.tasks.unshift(result.task);
      render();
      fetchAll(); // sync the full list from Notion in the background
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create Task';
    }
  }

  // ── Toggle done / archive ──────────────────────────────────────────────────
  async function toggleDone(taskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    // Animate the row before removing it
    const row = document.querySelector(`tr[data-id="${taskId}"]`);
    if (row) {
      row.classList.add('row-completing');
      const cb = row.querySelector('.task-cb');
      if (cb) cb.classList.add('checked');
    }

    const completedAt = new Date().toISOString();
    const archived = {
      id: task.id, name: task.name,
      assignee: task.assignees?.[0] || '',
      category: task.category || '',
      dueDate: task.dueDate || null,
      completedAt, status: 'Done',
    };

    // Optimistic: remove from active list after row animation completes
    setTimeout(() => {
      state.tasks   = state.tasks.filter(t => t.id !== taskId);
      // archive entry added below (before network call)
      render();
    }, 700);

    state.archive.unshift(archived);

    // Cancel any active reminder immediately (fire-and-forget)
    authFetch(`/reminders/${taskId}`, { method: 'DELETE' }).catch(console.error);

    try {
      await Promise.all([
        authFetch(`/tasks/${taskId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'Done' }) }),
        authFetch(`/archive/${taskId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(archived) }),
      ]);
    } catch (err) {
      // Rollback
      state.archive = state.archive.filter(t => t.id !== taskId);
      state.tasks.unshift(task);
      render();
      console.error('[taskr] toggleDone failed:', err.message);
    }
  }

  async function restoreTask(taskId) {
    const archived = state.archive.find(t => t.id === taskId);
    if (!archived) return;

    const btn = document.getElementById(`restore-${taskId}`);
    if (btn) { btn.disabled = true; btn.textContent = 'Restoring…'; }

    // Optimistic: remove from archive, add back to tasks
    state.archive = state.archive.filter(t => t.id !== taskId);
    state.tasks.unshift({
      id: archived.id, name: archived.name,
      assignees: archived.assignee ? [archived.assignee] : [],
      category: archived.category || null,
      dueDate: archived.dueDate || null,
      status: 'To do', priority: null,
      lastEdited: new Date().toISOString(),
    });
    render();

    try {
      await authFetch(`/archive/${taskId}`, { method: 'DELETE' });
    } catch (err) {
      // Rollback
      state.tasks = state.tasks.filter(t => t.id !== taskId);
      state.archive.unshift(archived);
      render();
      console.error('[taskr] restoreTask failed:', err.message);
    }
  }

  // ── Save task ──────────────────────────────────────────────────────────────
  async function saveTask() {
    const taskId = panelTaskId;
    if (!taskId) return;
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    const name      = document.getElementById('edit_name')?.value.trim();
    const status    = document.getElementById('edit_status')?.value || null;
    const dueDate   = document.getElementById('edit_dueDate')?.value || null;
    const priority  = document.getElementById('edit_priority')?.value || null;
    const category  = document.getElementById('edit_category')?.value || null;

    // Map selected names to Notion user IDs where possible
    const selectedNames = getPickerSelections('panel-pp');
    const assigneeIds = selectedNames
      .map(name => state.workspaceUsers?.find(u => u.name?.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(u.name?.toLowerCase())))
      .filter(Boolean)
      .map(u => u.id);

    // Extras for Telegram notifications on the backend
    const previousValues = {
      name:      task.name,
      status:    task.status,
      dueDate:   task.dueDate,
      priority:  task.priority,
      category:  task.category,
      assignees: state.tasksMeta[taskId]?.assignees || task.assignees || [],
    };

    const body = { status, dueDate, priority, category, assigneeIds, assigneeNames: selectedNames, taskName: task.name, previousValues };
    if (name) body.name = name;

    const btn = document.getElementById('saveBtn');
    const errEl = document.getElementById('saveError');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    if (errEl) errEl.style.display = 'none';

    try {
      const res = await authFetch(`/tasks/${taskId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'Save failed');

      if (name) task.name = name;
      if (status !== undefined) task.status = status;
      if (dueDate !== undefined) task.dueDate = dueDate;
      if (priority !== undefined) task.priority = priority;
      if (category !== undefined) task.category = category;
      task.assignees = selectedNames;

      // Persist assignees in meta so table/kanban display stays in sync
      if (!state.tasksMeta[taskId]) state.tasksMeta[taskId] = { notes: '', sop: '', sopLink: '', resources: [], assignees: [] };
      state.tasksMeta[taskId].assignees = selectedNames;
      authFetch(`/tasks-meta/${taskId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ assignees: selectedNames }),
      }).catch(() => {});

      document.getElementById('panelTitle').textContent = task.name;
      btn.textContent = '✓ Saved';
      btn.style.background = '#34c759';
      btn.disabled = false;
      setTimeout(() => { btn.textContent = 'Save'; btn.style.background = ''; }, 2000);
      render();
    } catch (err) {
      btn.textContent = 'Save';
      btn.disabled = false;
      if (errEl) { errEl.textContent = err.message; errEl.style.display = 'block'; }
    }
  }

  async function createResource() {
    const title = document.getElementById('new_res_title')?.value.trim();
    const category = document.getElementById('new_res_category')?.value || '';
    const content = document.getElementById('new_res_content')?.value || '';
    const btn = document.getElementById('createResBtn');
    const errEl = document.getElementById('newResError');
    if (!title) { if (errEl) { errEl.textContent = 'Title is required'; errEl.style.display = 'block'; } return; }
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const res = await authFetch('/resources', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, category }),
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'Failed to create');
      state.resources.unshift(result.resource);
      closePanel();
      render();
    } catch (err) {
      if (errEl) { errEl.textContent = err.message; errEl.style.display = 'block'; }
      btn.disabled = false; btn.textContent = 'Create Resource';

  async function saveResource(id) {
    const title = document.getElementById('res_title')?.value.trim();
    const category = document.getElementById('res_category')?.value || '';
    const content = document.getElementById('res_content')?.value || '';
    const btn = document.getElementById('saveResBtn');
    const errEl = document.getElementById('resError');
    if (!title) { if (errEl) { errEl.textContent = 'Title is required'; errEl.style.display = 'block'; } return; }
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const res = await authFetch(`/resources/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, category }),
      });
      if (!res.ok) throw new Error('Save failed');
      const r = state.resources.find(x => x.id === id);
      if (r) { r.title = title; r.content = content; r.category = category; }
      document.getElementById('panelTitle').textContent = title;
      btn.textContent = '✓ Saved'; btn.style.background = '#34c759';
      btn.disabled = false;
      setTimeout(() => { btn.textContent = 'Save'; btn.style.background = ''; }, 2000);
      render();
    } catch (err) {
      if (errEl) { errEl.textContent = err.message; errEl.style.display = 'block'; }
      btn.disabled = false; btn.textContent = 'Save';

  async function deleteResource(id) {
    if (!confirm('Delete this resource? This cannot be undone.')) return;
    try {
      await authFetch(`/resources/${id}`, { method: 'DELETE' });
      state.resources = state.resources.filter(r => r.id !== id);
      // Remove any task links pointing to this resource
      Object.keys(state.tasksMeta).forEach(tid => {
        if (state.tasksMeta[tid] === id) delete state.tasksMeta[tid];
      });
      closePanel();
      render();
    } catch (err) {
      alert('Failed to delete resource');
    }
  }

    try {

        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(meta),

      const hasNotes = !!(meta.notes?.trim());

      document.querySelectorAll('.panel-tab').forEach(btn => {

  function setReminderForTask(taskId, taskName, intervalKey) {
    // Optimistic UI: immediately show active badge
    const sec = document.getElementById('panel-reminder-section');
    if (sec) {
      const label = INTERVAL_LABELS[intervalKey] || intervalKey;
      sec.innerHTML =
        `<div class="reminder-active-pill">` +
        `⏰ Reminding every ${label}` +
        `<button type="button" class="reminder-cancel-btn" onclick="cancelReminderForTask('${taskId}')">×</button>` +
        `</div>`;
    }
    // Fire POST in background — no panel reload
    const assigneeNames = getPickerSelections('panel-pp');
    authFetch('/reminders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ taskId, taskName, intervalKey, assigneeNames }),
    }).catch(err => console.error('[setReminderForTask]', err));
  }

  function cancelReminderForTask(taskId) {
    // Optimistic UI: immediately restore pill list
    const sec = document.getElementById('panel-reminder-section');
    const task = (state.tasks || []).find(t => t.id === taskId);
    if (sec && task) {
      const todayStr = new Date().toISOString().split('T')[0];
      const taskOverdue = !!(task.dueDate && task.dueDate < todayStr && task.status !== 'Done');
      const warning = taskOverdue
        ? `<div class="rem-overdue-warning">⚠️ This task is overdue. Reminders will send overdue alerts instead of regular reminders.</div>`
        : '';
      sec.innerHTML =
        `<div class="rem-pills">` +
        REMINDER_OPTIONS.map(([key, label]) =>
          `<button type="button" class="rem-pill" onclick="setReminderForTask('${esc(taskId)}','${esc(task.name)}','${key}')">${label}</button>`
        ).join('') +
        `</div>${warning}`;
    }
    // Fire DELETE in background — no panel reload
    authFetch(`/reminders/${taskId}`, { method: 'DELETE' })
      .catch(err => console.error('[cancelReminderForTask]', err));
  }

  // ── Recurring tasks ────────────────────────────────────────────────────────

  const FREQ_LABELS = {
    daily:    'Daily',
    weekday:  'Weekday',
    weekly:   'Weekly',
    biweekly: 'Biweekly',
    monthly:  'Monthly',
  };
  const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function freqLabel(rt) {
    if (rt.frequency === 'custom') return `Every ${rt.customDays || '?'} days`;
    return FREQ_LABELS[rt.frequency] || rt.frequency;
  }

  function nextDueDateStr(rt) {
    const today = new Date().toISOString().split('T')[0];
    if (!rt.lastCreated && rt.startDate >= today) return `Starts ${fmtDate(rt.startDate)}`;
    const base = new Date(rt.lastCreated || rt.startDate);
    let next = new Date(base);
    switch (rt.frequency) {
      case 'daily':    next.setDate(next.getDate() + 1); break;
      case 'weekday':  next.setDate(next.getDate() + 1);
                       while ([0,6].includes(next.getDay())) next.setDate(next.getDate() + 1);
                       break;
      case 'weekly':   next.setDate(next.getDate() + 7); break;
      case 'biweekly': next.setDate(next.getDate() + 14); break;
      case 'monthly':  next = new Date(base); next.setMonth(next.getMonth() + 1);
                       if (rt.dayOfMonth) next.setDate(rt.dayOfMonth); break;
      case 'custom':   next.setDate(next.getDate() + (rt.customDays || 1)); break;
      default: return '—';
    }
    const ns = next.toISOString().split('T')[0];
    return `Next: ${ns === today ? 'Today' : fmtDate(ns)}`;
  }

    menu.innerHTML = `

    document.body.appendChild(menu);
    const close = () => { menu.remove(); document.removeEventListener('click', close); };

      <div id="rcError" style="display:none;margin-top:8px" class="form-error"></div>`;
  }

  function toggleRecurringFreq() {
    const freq = document.getElementById('rc_frequency')?.value;
    document.getElementById('rc_dow_wrap').style.display  = freq === 'weekly'  ? 'block' : 'none';
    document.getElementById('rc_dom_wrap').style.display  = freq === 'monthly' ? 'block' : 'none';
    document.getElementById('rc_custom_wrap').style.display = freq === 'custom' ? 'block' : 'none';
  }

  function toggleDowBtn(btn) { btn.classList.toggle('selected'); }

  function toggleRcReminderPill(key) {
    const current = document.querySelector('#rc_reminder_pills .rem-pill-active');
    // If clicking the already-selected pill, deselect it
    if (current?.dataset.key === key || current?.textContent === INTERVAL_LABELS[key]) {
      current.classList.remove('rem-pill-active');
      return;
    }
    document.querySelectorAll('#rc_reminder_pills .rem-pill').forEach(p => p.classList.remove('rem-pill-active'));
    const pills = document.querySelectorAll('#rc_reminder_pills .rem-pill');
    REMINDER_OPTIONS.forEach(([k], i) => { if (k === key) pills[i]?.classList.add('rem-pill-active'); });
  }

  async function submitRecurring() {
    const btn   = document.getElementById('rcSaveBtn');
    const errEl = document.getElementById('rcError');
    const name  = document.getElementById('rc_name')?.value.trim();
    if (!name) { errEl.textContent = 'Task name is required'; errEl.style.display = 'block'; return; }

    const freq      = document.getElementById('rc_frequency')?.value;
    const assignees = getPickerSelections('rc-pp');

    // Day of week: first selected dow-btn
    const selectedDow = document.querySelector('#rc_dow_wrap .dow-btn.selected');
    const dayOfWeek   = selectedDow ? parseInt(selectedDow.dataset.dow) : null;
    const dayOfMonth  = parseInt(document.getElementById('rc_dom')?.value) || null;
    const customDays  = parseInt(document.getElementById('rc_customDays')?.value) || null;

    // Reminder interval: active pill
    const activePill = document.querySelector('#rc_reminder_pills .rem-pill-active');
    const reminderInterval = activePill
      ? REMINDER_OPTIONS[Array.from(document.querySelectorAll('#rc_reminder_pills .rem-pill')).indexOf(activePill)]?.[0] || null
      : null;

    const payload = {
      name,
      assignees,
      category:         document.getElementById('rc_category')?.value  || '',
      priority:         document.getElementById('rc_priority')?.value  || '',
      frequency: freq,
      dayOfWeek:        freq === 'weekly'  ? dayOfWeek  : null,
      dayOfMonth:       freq === 'monthly' ? dayOfMonth : null,
      customDays:       freq === 'custom'  ? customDays : null,
      startDate:        document.getElementById('rc_startDate')?.value || '',
      reminderInterval,
      notes:            document.getElementById('rc_notes')?.value || '',
      sop:              document.getElementById('rc_sop')?.value   || '',
    };

    btn.disabled = true;
    btn.textContent = panelRecurringId ? 'Saving…' : 'Creating…';
    errEl.style.display = 'none';

    try {
      const url    = panelRecurringId ? `/recurring/${panelRecurringId}` : '/recurring';
      const method = panelRecurringId ? 'PATCH' : 'POST';
      const res = await authFetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');

      if (panelRecurringId) {
        const idx = state.recurring.findIndex(r => r.id === panelRecurringId);
        if (idx !== -1) state.recurring[idx] = data.recurring;
      } else {
        state.recurring.unshift(data.recurring);
      }
      closePanel();
      render();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = panelRecurringId ? 'Save Changes' : 'Create';
    }
  }

  // ── Kanban board ───────────────────────────────────────────────────────────
  let kbMenuEl = null;

  function kbShowMenu(taskId, event) {
    event.stopPropagation();
    if (kbMenuEl) { kbMenuEl.remove(); kbMenuEl = null; }
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    const STATUSES = ['To do', 'In progress', 'In review', 'Blocked', 'Done'];
    const menu = document.createElement('div');
    menu.className = 'kb-move-menu';
    menu.innerHTML = STATUSES.map(s =>
      `<button class="kb-move-item${s === task.status ? ' current' : ''}"
         onclick="kbMoveTo('${taskId}','${s}');event.stopPropagation()">
         ${esc(s)}${s === task.status ? ' ✓' : ''}
       </button>`
    ).join('');

    document.body.appendChild(menu);
    kbMenuEl = menu;

    // Position using fixed coords so it escapes any overflow:hidden parent
    const btn = event.currentTarget;
    const rect = btn.getBoundingClientRect();
    const menuH = STATUSES.length * 41;
    const spaceBelow = window.innerHeight - rect.bottom;
    if (spaceBelow < menuH && rect.top > menuH) {
      menu.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
    } else {
      menu.style.top = (rect.bottom + 4) + 'px';
    }
    menu.style.right = (window.innerWidth - rect.right) + 'px';

    setTimeout(() => {
      document.addEventListener('click', function closeMenu() {
        if (kbMenuEl) { kbMenuEl.remove(); kbMenuEl = null; }
        document.removeEventListener('click', closeMenu);
      });
    }, 0);
  }

  async function kbMoveTo(taskId, newStatus) {
    if (kbMenuEl) { kbMenuEl.remove(); kbMenuEl = null; }
    if (newStatus === 'Done') { toggleDone(taskId); return; }
    const task = state.tasks.find(t => t.id === taskId);
    if (!task || task.status === newStatus) return;
    const oldStatus = task.status;
    task.status = newStatus;
    render();
    try {
      const res = await authFetch(`/tasks/${taskId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus }),
      });
      if (!res.ok) throw new Error('Failed');
    } catch {
      task.status = oldStatus;
      render();
    }
  }

  async function panelSetStatus(newStatus) {
    if (newStatus === 'Done') {
      await toggleDone(panelTaskId);
      closePanel();
      return;
    }

    document.querySelectorAll('.status-seg-btn').forEach(btn => {
      btn.classList.toggle('seg-active', btn.dataset.s === newStatus);
    });
    const hidden = document.getElementById('edit_status');
    if (hidden) hidden.value = newStatus;

    const task = state.tasks.find(t => t.id === panelTaskId);
    if (!task || task.status === newStatus) return;
    const oldStatus = task.status;
    task.status = newStatus;
    render();

    try {
      await authFetch(`/tasks/${panelTaskId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus }),
      });
    } catch {
      task.status = oldStatus;
      if (hidden) hidden.value = oldStatus;
      document.querySelectorAll('.status-seg-btn').forEach(btn => {
        btn.classList.toggle('seg-active', btn.dataset.s === oldStatus);
      });
    }
  }

  function renderBoard() {
    const COLS = ['No Status', 'To do', 'In progress', 'In review', 'Blocked'];
    const today = todayStr();

    let tasks = state.tasks.filter(t => t.name?.trim());
    if (state.filter.search) {
      const q = state.filter.search.toLowerCase();
      tasks = tasks.filter(t =>
        t.name.toLowerCase().includes(q) ||
        (t.assignees||[]).some(a => a.toLowerCase().includes(q))
      );
    }
    if (state.filter.category) tasks = tasks.filter(t => t.category === state.filter.category);

    const byStatus = {};
    COLS.forEach(c => byStatus[c] = []);
    for (const t of tasks) {
      const col = t.status || 'No Status';
      (byStatus[col] || (byStatus['No Status'])).push(t);
    }

    const cardHtml = t => {
      const assignees = state.tasksMeta[t.id]?.assignees?.length ? state.tasksMeta[t.id].assignees : (t.assignees || []);
      const overdue = t.dueDate && t.dueDate < today && t.status !== 'Done';
      const done = t.status === 'Done';
      const pl = (t.priority || '').toLowerCase();
      const prioCls = pl.includes('high') ? 'p-high' : pl.includes('medium') ? 'p-medium' : pl.includes('low') ? 'p-low' : '';
      return `
        <div class="kb-card${overdue ? ' overdue' : ''}${done ? ' kb-done' : ''}"
             data-id="${esc(t.id)}"
             onclick="openPanel('${esc(t.id)}')">
          <div class="kb-card-top">
            <span class="kb-card-name">${esc(t.name)}</span>
            ${done
              ? `<div class="kb-done-badge"><svg viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
              : (prioCls ? `<div class="p-dot ${prioCls}" title="${esc(t.priority||'')}"></div>` : '')}
          </div>
          <div class="kb-assignee-row">
            ${assignees.length ? avatarStackHtml(assignees, 18) : avatarHtml('?', 18)}
            ${assignees.length > 0 && assignees.length <= 2 ? `<span class="kb-assignee">${esc(assignees.map(n => firstName(n)).join(', '))}</span>` : ''}
            ${(m => m && (m.notes?.trim() || m.sop?.trim() || m.resources?.length))(state.tasksMeta[t.id]) ? `<span class="kb-res-icon" title="Has notes/resources">📄</span>` : ''}
          </div>
          <div class="kb-meta-row">
            ${t.category ? catPill(t.category) : ''}
            ${t.dueDate ? `<span class="kb-due${overdue ? ' kb-overdue' : ''}">${esc(fmtDate(t.dueDate))}</span>` : ''}
          </div>
          <div class="kb-card-footer" onclick="event.stopPropagation()">
            <button class="kb-move-btn" onclick="kbShowMenu('${esc(t.id)}',event)">Move to →</button>
          </div>
        </div>`;
    };

    const colHtml = col => {
      const items = byStatus[col] || [];
      const preStatus = col === 'No Status' ? 'To do' : col;
      return `
        <div class="kb-col">
          <div class="kb-col-header">
            <span class="kb-col-title">${esc(col)}</span>
            <span class="kb-col-count">${items.length}</span>
          </div>
          <div class="kb-col-body">
            ${items.length === 0
              ? `<div class="kb-empty">No tasks</div>`
              : items.map(cardHtml).join('')}
          </div>
          <div class="kb-col-footer">
            <button class="kb-add-btn" onclick="openCreatePanel('${esc(preStatus)}')">+ Add task</button>
          </div>
        </div>`;
    };

    const { search, category } = state.filter;
    const CATS = ['Ads','Fulfillment','Creative','Finance','Operations'];

    return `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div class="page-title" style="margin-bottom:0">Tasks</div>
        <div style="display:flex;align-items:center;gap:10px">
          ${viewToggleHtml()}
          <button class="new-task-btn" onclick="openCreatePanel()">+ New Task</button>
        </div>
      </div>
      <div class="search-row" style="margin-bottom:18px">
        <input class="search-input" type="text" placeholder="Search tasks or assignees…"
          value="${esc(search)}" oninput="setFilter('search',this.value)">
        <select class="cat-select" onchange="setFilter('category',this.value)">
          <option value="">All categories</option>
          ${CATS.map(c => `<option value="${c}"${c === category ? ' selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="kb-board">
        ${COLS.map(colHtml).join('')}
      </div>`;
  }

  function renderCompleted() {

  function openPersonalPanel(taskId) {
    personalPanelId = taskId;
    const task = taskId ? state.personalTasks.find(t => t.id === taskId) : null;
    document.getElementById('panelTitle').textContent = task ? 'Personal Task' : 'New Personal Task';
    document.getElementById('panelBody').innerHTML    = personalPanelContent(task);
    document.getElementById('panel').classList.add('open');
    document.getElementById('overlay').classList.add('show');
  }

  function personalPanelContent(task) {
    const t      = task || {};
    const prio   = t.priority || '';
    const remind = t.reminderInterval || '';

    // Priority — segmented buttons matching team task panel style
    const PRIO_OPTS = [
      { val: '🔴 High',   label: 'High',   cls: 's-blocked' },
      { val: '🟡 Medium', label: 'Medium', cls: 's-review'  },
      { val: '🟢 Low',    label: 'Low',    cls: 's-done'    },
    ];
    const prioSeg = PRIO_OPTS.map(({ val, label, cls }) =>
      `<button type="button" class="status-seg-btn ${cls}${prio === val ? ' seg-active' : ''}"
        data-prio="${esc(val)}" onclick="ptSetPrio('${esc(val)}')">${label}</button>`
    ).join('');

    // Reminder — pill buttons matching team task panel style
    const reminderPills = REMINDER_OPTIONS.map(([key, label]) =>
      `<button type="button" class="rem-pill${remind === key ? ' rem-pill-active' : ''}"
        data-key="${esc(key)}" onclick="ptToggleReminder('${esc(key)}')">${label}</button>`
    ).join('');

    return `
      <div class="form-field">
        <label class="form-label" for="pt_name">Task Name</label>
        <input id="pt_name" class="form-input" type="text" value="${esc(t.name||'')}"
          placeholder="What needs to be done?">
      </div>
      <div class="form-field">
        <label class="form-label" for="pt_due">Due Date</label>
        ${DP.field('pt_due', t.dueDate || '')}
      </div>
      <div class="form-field">
        <div class="form-label">Priority</div>
        <input type="hidden" id="pt_prio" value="${esc(prio)}">
        <div class="status-seg">${prioSeg}</div>
      </div>
      <div class="form-field">
        <div class="form-label">Reminder</div>
        <div class="rem-pills" id="pt_reminder_pills">${reminderPills}</div>
      </div>
      <div class="form-field">
        <label class="form-label" for="pt_notes">Notes</label>
        <textarea id="pt_notes" class="form-input res-textarea" style="min-height:100px"
          placeholder="Add notes, context, or reminders...">${esc(t.notes||'')}</textarea>
      </div>
      <button type="button" id="ptSaveBtn" class="panel-save-btn" onclick="savePersonalTask()">
        ${task ? 'Save' : 'Create Task'}
      </button>
      ${task ? `<button class="modal-cancel-btn" style="margin-top:8px"
        onclick="deletePersonalTask('${esc(task.id)}')">Delete Task</button>` : ''}
    `;
  }

  function ptSetPrio(val) {
    document.getElementById('pt_prio').value = val;
    document.querySelectorAll('.status-seg .status-seg-btn[data-prio]').forEach(btn =>
      btn.classList.toggle('seg-active', btn.dataset.prio === val)
    );
  }

  function ptToggleReminder(key) {
    const pills = document.querySelectorAll('#pt_reminder_pills .rem-pill');
    pills.forEach(p => {
      if (p.dataset.key === key) {
        // clicking active pill deselects it
        const wasActive = p.classList.contains('rem-pill-active');
        pills.forEach(x => x.classList.remove('rem-pill-active'));
        if (!wasActive) p.classList.add('rem-pill-active');
      }
    });
  }

  async function savePersonalTask() {
    const name = document.getElementById('pt_name')?.value.trim();
    if (!name) return;

    const activePill = document.querySelector('#pt_reminder_pills .rem-pill-active');
    const payload = {
      name,
      dueDate:          document.getElementById('pt_due')?.value  || null,
      priority:         document.getElementById('pt_prio')?.value || null,
      reminderInterval: activePill ? activePill.dataset.key       : null,
      notes:            document.getElementById('pt_notes')?.value || '',
    };
    try {
      if (personalPanelId) {
        const res  = await authFetch(`/personal/tasks/${personalPanelId}`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (res.ok) {
          const idx = state.personalTasks.findIndex(t => t.id === personalPanelId);
          if (idx !== -1) state.personalTasks[idx] = data.task;
        }
      } else {
        const res  = await authFetch('/personal/tasks', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (res.ok) state.personalTasks.unshift(data.task);
      }
    } catch (err) { console.error('[personal save]', err); }
    closePanel();
    render();
  }

  async function togglePersonalDone(taskId) {
    const task = state.personalTasks.find(t => t.id === taskId);
    if (!task) return;
    const newStatus = task.status === 'done' ? 'active' : 'done';
    task.status = newStatus; // optimistic
    render();
    try {
      await authFetch(`/personal/tasks/${taskId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus }),
      });
    } catch (err) { console.error('[personal toggle]', err); }
  }

  async function deletePersonalTask(taskId) {
    state.personalTasks = state.personalTasks.filter(t => t.id !== taskId);
    closePanel();
    render();
    try {
      await authFetch(`/personal/tasks/${taskId}`, { method: 'DELETE' });
    } catch (err) { console.error('[personal delete]', err); }
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    const main = document.getElementById('main');
    switch (state.page) {
      case 'dashboard':   main.innerHTML = renderDashboard();   break;
      case 'tasks':       main.innerHTML = renderTasks();       break;
      case 'mytasks':     main.innerHTML = renderMyTasks();     break;
      case 'personal':    main.innerHTML = renderPersonal();    break;
      case 'performance': main.innerHTML = renderPerformance(); break;
      case 'resources':   main.innerHTML = renderResources();   break;
      case 'completed':   main.innerHTML = renderCompleted();   break;
      case 'recurring':   main.innerHTML = renderRecurring();   break;
    }
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  initTheme();
  checkAuth();
  setInterval(() => { if (state.user) fetchAll(); }, 60000);
</script>
</body>
</html>
