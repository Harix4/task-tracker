    return `
      <div class="form-field">
        <label class="form-label" for="rc_name">Task Name *</label>
        <input id="rc_name" class="form-input" type="text" value="${esc(v('name'))}" placeholder="e.g. Instagram Post">
      </div>
      <div class="form-field">
        <label class="form-label">Assignee</label>
        ${peoplePicker(assignees, 'rc-pp')}
      </div>
      <div class="form-field">
        <label class="form-label" for="rc_category">Category</label>
        <select id="rc_category" class="form-input">
          <option value="">—</option>
          ${['Ads','Fulfillment','Creative','Finance','Operations','Marketing','Accounting'].map(c =>
            `<option value="${c}"${v('category')===c?' selected':''}>${c}</option>`
          ).join('')}
        </select>
      </div>
      <div class="form-field">
        <label class="form-label" for="rc_priority">Priority</label>
        <select id="rc_priority" class="form-input">
          <option value="">—</option>
          ${['🔴 High','🟡 Medium','🟢 Low'].map(p => {
            const label = p.replace(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}️‍\s]+/u,'').trim();
            return `<option value="${esc(p)}"${v('priority')===p?' selected':''}>${label}</option>`;
          }).join('')}
        </select>
      </div>
      <div class="form-field">
        <label class="form-label" for="rc_frequency">Frequency</label>
        <select id="rc_frequency" class="form-input" onchange="toggleRecurringFreq()">
          ${[['daily','Daily'],['weekday','Every weekday (Mon–Fri)'],['weekly','Weekly'],['biweekly','Biweekly'],['monthly','Monthly'],['custom','Custom']].map(([val,lbl]) =>
            `<option value="${val}"${freq===val?' selected':''}>${lbl}</option>`
          ).join('')}
        </select>
      </div>
      <div id="rc_dow_wrap" class="form-field" style="display:none">
        <label class="form-label">Day of week</label>
        <div class="dow-picker">
          ${DAYS_SHORT.map((d,i) =>
            `<button type="button" class="dow-btn${dow===i?' selected':''}" data-dow="${i}" onclick="toggleDowBtn(this)">${d}</button>`
          ).join('')}
        </div>
      </div>
      <div id="rc_dom_wrap" class="form-field" style="display:none">
        <label class="form-label" for="rc_dom">Day of month</label>
        <input id="rc_dom" class="form-input" type="number" min="1" max="31" value="${dom || ''}" placeholder="1–31" style="width:80px">
      </div>
      <div id="rc_custom_wrap" class="form-field" style="display:none">
        <label class="form-label" for="rc_customDays">Every</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input id="rc_customDays" class="form-input" type="number" min="1" value="${v('customDays','')||''}" placeholder="7" style="width:70px">
          <span style="font-size:13px;color:var(--muted)">days</span>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label" for="rc_startDate">Start Date</label>
        <input id="rc_startDate" class="form-input" type="date" value="${esc(v('startDate', new Date().toISOString().split('T')[0]))}">
      </div>
      <div class="form-field">
        <div class="form-label">Auto-assign Reminder (optional)</div>
        <div class="rem-pills" id="rc_reminder_pills">
          ${REMINDER_OPTIONS.map(([key,label]) => {
            const sel = v('reminderInterval') === key;
            return `<button type="button" class="rem-pill${sel?' rem-pill-active':''}"
              onclick="toggleRcReminderPill('${key}')">${label}</button>`;
          }).join('')}
        </div>
      </div>
      <div class="form-field">
        <label class="form-label" for="rc_notes">Notes</label>
        <textarea id="rc_notes" class="form-input res-textarea" style="min-height:80px" placeholder="Optional notes…">${esc(v('notes'))}</textarea>
      </div>
      <div class="form-field">
        <label class="form-label" for="rc_sop">SOP</label>
        <textarea id="rc_sop" class="form-input res-textarea" style="min-height:80px" placeholder="Paste SOP steps…">${esc(v('sop'))}</textarea>
      </div>
      <button type="button" id="rcSaveBtn" class="panel-save-btn" onclick="submitRecurring()">${rt ? 'Save Changes' : 'Create'}</button>
      <div id="rcError" style="display:none;margin-top:8px" class="form-error"></div>`;
  }

  function toggleRecurringFreq() {
    const freq = document.getElementById('rc_frequency')?.value;
    document.getElementById('rc_dow_wrap').style.display  = freq === 'weekly'  ? 'block' : 'none';
    document.getElementById('rc_dom_wrap').style.display  = freq === 'monthly' ? 'block' : 'none';
    document.getElementById('rc_custom_wrap').style.display = freq === 'custom' ? 'block' : 'none';
  }

  function toggleDowBtn(btn) { btn.classList.toggle('selected'); }

  function toggleRcReminderPill(key) {
    const current = document.querySelector('#rc_reminder_pills .rem-pill-active');
    // If clicking the already-selected pill, deselect it
    if (current?.dataset.key === key || current?.textContent === INTERVAL_LABELS[key]) {
      current.classList.remove('rem-pill-active');
      return;
    }
    document.querySelectorAll('#rc_reminder_pills .rem-pill').forEach(p => p.classList.remove('rem-pill-active'));
    const pills = document.querySelectorAll('#rc_reminder_pills .rem-pill');
    REMINDER_OPTIONS.forEach(([k], i) => { if (k === key) pills[i]?.classList.add('rem-pill-active'); });
  }

  async function submitRecurring() {
    const btn   = document.getElementById('rcSaveBtn');
    const errEl = document.getElementById('rcError');
    const name  = document.getElementById('rc_name')?.value.trim();
    if (!name) { errEl.textContent = 'Task name is required'; errEl.style.display = 'block'; return; }

    const freq      = document.getElementById('rc_frequency')?.value;
    const assignees = getPickerSelections('rc-pp');

    // Day of week: first selected dow-btn
    const selectedDow = document.querySelector('#rc_dow_wrap .dow-btn.selected');
    const dayOfWeek   = selectedDow ? parseInt(selectedDow.dataset.dow) : null;
    const dayOfMonth  = parseInt(document.getElementById('rc_dom')?.value) || null;
    const customDays  = parseInt(document.getElementById('rc_customDays')?.value) || null;

    // Reminder interval: active pill
    const activePill = document.querySelector('#rc_reminder_pills .rem-pill-active');
    const reminderInterval = activePill
      ? REMINDER_OPTIONS[Array.from(document.querySelectorAll('#rc_reminder_pills .rem-pill')).indexOf(activePill)]?.[0] || null
      : null;

    const payload = {
      name,
      assignees,
      category:         document.getElementById('rc_category')?.value  || '',
      priority:         document.getElementById('rc_priority')?.value  || '',
      frequency: freq,
      dayOfWeek:        freq === 'weekly'  ? dayOfWeek  : null,
      dayOfMonth:       freq === 'monthly' ? dayOfMonth : null,
      customDays:       freq === 'custom'  ? customDays : null,
      startDate:        document.getElementById('rc_startDate')?.value || '',
      reminderInterval,
      notes:            document.getElementById('rc_notes')?.value || '',
      sop:              document.getElementById('rc_sop')?.value   || '',
    };

    btn.disabled = true;
    btn.textContent = panelRecurringId ? 'Saving…' : 'Creating…';
    errEl.style.display = 'none';

    try {
      const url    = panelRecurringId ? `/recurring/${panelRecurringId}` : '/recurring';
      const method = panelRecurringId ? 'PATCH' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');

      if (panelRecurringId) {
        const idx = state.recurring.findIndex(r => r.id === panelRecurringId);
        if (idx !== -1) state.recurring[idx] = data.recurring;
      } else {
        state.recurring.unshift(data.recurring);
      }
      closePanel();
      render();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = panelRecurringId ? 'Save Changes' : 'Create';
    }
  }

  // ── View mode ──────────────────────────────────────────────────────────────
  function setViewMode(mode) {
    state.viewMode = mode;
    render();
  }

  function viewToggleHtml() {
    const t = state.viewMode === 'table';
    return `<div class="view-toggle">
      <button class="view-btn${t ? ' active' : ''}" onclick="setViewMode('table')" title="Table view">
        <svg viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <path d="M2 4h11M2 7.5h11M2 11h11"/>
        </svg>
      </button>
      <button class="view-btn${!t ? ' active' : ''}" onclick="setViewMode('board')" title="Board view">
        <svg viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1.5" y="1.5" width="4" height="12" rx="1.2"/>
          <rect x="7.5" y="1.5" width="4" height="9" rx="1.2"/>
          <rect x="7.5" y="12" width="4" height="1.5" rx="0.75" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </div>`;
  }

  // ── Kanban board ───────────────────────────────────────────────────────────
  let kbMenuEl = null;

  function kbShowMenu(taskId, event) {
    event.stopPropagation();
    if (kbMenuEl) { kbMenuEl.remove(); kbMenuEl = null; }
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    const STATUSES = ['To do', 'In progress', 'In review', 'Blocked', 'Done'];
    const menu = document.createElement('div');
    menu.className = 'kb-move-menu';
    menu.innerHTML = STATUSES.map(s =>
      `<button class="kb-move-item${s === task.status ? ' current' : ''}"
         onclick="kbMoveTo('${taskId}','${s}');event.stopPropagation()">
         ${esc(s)}${s === task.status ? ' ✓' : ''}
       </button>`
    ).join('');

    document.body.appendChild(menu);
    kbMenuEl = menu;

    // Position using fixed coords so it escapes any overflow:hidden parent
    const btn = event.currentTarget;
    const rect = btn.getBoundingClientRect();
    const menuH = STATUSES.length * 41;
    const spaceBelow = window.innerHeight - rect.bottom;
    if (spaceBelow < menuH && rect.top > menuH) {
      menu.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
    } else {
      menu.style.top = (rect.bottom + 4) + 'px';
    }
    menu.style.right = (window.innerWidth - rect.right) + 'px';

    setTimeout(() => {
      document.addEventListener('click', function closeMenu() {
        if (kbMenuEl) { kbMenuEl.remove(); kbMenuEl = null; }
        document.removeEventListener('click', closeMenu);
      });
    }, 0);
  }

  async function kbMoveTo(taskId, newStatus) {
    if (kbMenuEl) { kbMenuEl.remove(); kbMenuEl = null; }
    if (newStatus === 'Done') { toggleDone(taskId); return; }
    const task = state.tasks.find(t => t.id === taskId);
    if (!task || task.status === newStatus) return;
    const oldStatus = task.status;
    task.status = newStatus;
    render();
    try {
      const res = await fetch(`/tasks/${taskId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus }),
      });
      if (!res.ok) throw new Error('Failed');
    } catch {
      task.status = oldStatus;
      render();
    }
  }

  async function panelSetStatus(newStatus) {
    if (newStatus === 'Done') {
      await toggleDone(panelTaskId);
      closePanel();
      return;
    }

    document.querySelectorAll('.status-seg-btn').forEach(btn => {
      btn.classList.toggle('seg-active', btn.dataset.s === newStatus);
    });
    const hidden = document.getElementById('edit_status');
    if (hidden) hidden.value = newStatus;

    const task = state.tasks.find(t => t.id === panelTaskId);
    if (!task || task.status === newStatus) return;
    const oldStatus = task.status;
    task.status = newStatus;
    render();

    try {
      await fetch(`/tasks/${panelTaskId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus }),
      });
    } catch {
      task.status = oldStatus;
      if (hidden) hidden.value = oldStatus;
      document.querySelectorAll('.status-seg-btn').forEach(btn => {
        btn.classList.toggle('seg-active', btn.dataset.s === oldStatus);
      });
    }
  }

  function renderBoard() {
    const COLS = ['No Status', 'To do', 'In progress', 'In review', 'Blocked'];
    const today = todayStr();

    let tasks = state.tasks.filter(t => t.name?.trim());
    if (state.filter.search) {
      const q = state.filter.search.toLowerCase();
      tasks = tasks.filter(t =>
        t.name.toLowerCase().includes(q) ||
        (t.assignees||[]).some(a => a.toLowerCase().includes(q))
      );
    }
    if (state.filter.category) tasks = tasks.filter(t => t.category === state.filter.category);

    const byStatus = {};
    COLS.forEach(c => byStatus[c] = []);
    for (const t of tasks) {
      const col = t.status || 'No Status';
      (byStatus[col] || (byStatus['No Status'])).push(t);
    }

    const cardHtml = t => {
      const assignees = state.tasksMeta[t.id]?.assignees?.length ? state.tasksMeta[t.id].assignees : (t.assignees || []);
      const overdue = t.dueDate && t.dueDate < today && t.status !== 'Done';
      const done = t.status === 'Done';
      const pl = (t.priority || '').toLowerCase();
      const prioCls = pl.includes('high') ? 'p-high' : pl.includes('medium') ? 'p-medium' : pl.includes('low') ? 'p-low' : '';
      return `
        <div class="kb-card${overdue ? ' overdue' : ''}${done ? ' kb-done' : ''}"
             data-id="${esc(t.id)}"
             onclick="openPanel('${esc(t.id)}')">
          <div class="kb-card-top">
            <span class="kb-card-name">${esc(t.name)}</span>
            ${done
              ? `<div class="kb-done-badge"><svg viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
              : (prioCls ? `<div class="p-dot ${prioCls}" title="${esc(t.priority||'')}"></div>` : '')}
          </div>
          <div class="kb-assignee-row">
            ${assignees.length ? avatarStackHtml(assignees, 18) : avatarHtml('?', 18)}
            ${assignees.length > 0 && assignees.length <= 2 ? `<span class="kb-assignee">${esc(assignees.map(n => firstName(n)).join(', '))}</span>` : ''}
            ${(m => m && (m.notes?.trim() || m.sop?.trim() || m.resources?.length))(state.tasksMeta[t.id]) ? `<span class="kb-res-icon" title="Has notes/resources">📄</span>` : ''}
          </div>
          <div class="kb-meta-row">
            ${t.category ? catPill(t.category) : ''}
            ${t.dueDate ? `<span class="kb-due${overdue ? ' kb-overdue' : ''}">${esc(fmtDate(t.dueDate))}</span>` : ''}
          </div>
          <div class="kb-card-footer" onclick="event.stopPropagation()">
            <button class="kb-move-btn" onclick="kbShowMenu('${esc(t.id)}',event)">Move to →</button>
          </div>
        </div>`;
    };

    const colHtml = col => {
      const items = byStatus[col] || [];
      const preStatus = col === 'No Status' ? 'To do' : col;
      return `
        <div class="kb-col">
          <div class="kb-col-header">
            <span class="kb-col-title">${esc(col)}</span>
            <span class="kb-col-count">${items.length}</span>
          </div>
          <div class="kb-col-body">
            ${items.length === 0
              ? `<div class="kb-empty">No tasks</div>`
              : items.map(cardHtml).join('')}
          </div>
          <div class="kb-col-footer">
            <button class="kb-add-btn" onclick="openCreatePanel('${esc(preStatus)}')">+ Add task</button>
          </div>
        </div>`;
    };

    const { search, category } = state.filter;
    const CATS = ['Ads','Fulfillment','Creative','Finance','Operations'];

    return `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div class="page-title" style="margin-bottom:0">Tasks</div>
        <div style="display:flex;align-items:center;gap:10px">
          ${viewToggleHtml()}
          <button class="new-task-btn" onclick="openCreatePanel()">+ New Task</button>
        </div>
      </div>
      <div class="search-row" style="margin-bottom:18px">
        <input class="search-input" type="text" placeholder="Search tasks or assignees…"
          value="${esc(search)}" oninput="setFilter('search',this.value)">
        <select class="cat-select" onchange="setFilter('category',this.value)">
          <option value="">All categories</option>
          ${CATS.map(c => `<option value="${c}"${c === category ? ' selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="kb-board">
        ${COLS.map(colHtml).join('')}
      </div>`;
  }

  function renderCompleted() {
    const tasks = state.archive.slice().sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));
    const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
    const thisWeek = tasks.filter(t => new Date(t.completedAt) >= weekAgo).length;

    return `
      <div class="page-title">Completed</div>
      <div class="completed-stats">
        <div class="completed-stat">
          <div class="completed-stat-label">Total Completed</div>
          <div class="completed-stat-value">${tasks.length}</div>
        </div>
        <div class="completed-stat">
          <div class="completed-stat-label">This Week</div>
          <div class="completed-stat-value">${thisWeek}</div>
        </div>
      </div>
      ${tasks.length === 0
        ? '<div class="empty"><div class="empty-icon">🎉</div>No completed tasks yet — mark tasks done to see them here</div>'
        : `<div class="table-wrap">
            <table>
              <thead><tr>
                <th>Task</th><th>Assignee</th><th>Category</th><th>Due Date</th><th>Completed</th><th></th>
              </tr></thead>
              <tbody>
                ${tasks.map(t => `
                  <tr class="completed-row">
                    <td class="td-task-done">${esc(t.name)}</td>
                    <td><div class="td-assignee">${avatarHtml(t.assignee || '?', 24)}<span style="font-size:13px">${esc(firstName(t.assignee || 'Unassigned'))}</span></div></td>
                    <td>${catPill(t.category) || `<span style="color:var(--muted)">—</span>`}</td>
                    <td>${t.dueDate ? esc(fmtDate(t.dueDate)) : '<span style="color:var(--muted)">—</span>'}</td>
                    <td style="font-size:12px;color:var(--muted)">${esc(fmtDateTime(t.completedAt))}</td>
                    <td onclick="event.stopPropagation()">
                      <button id="restore-${esc(t.id)}" class="restore-btn" onclick="restoreTask('${esc(t.id)}')">Restore</button>
                    </td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>`}`;
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    const main = document.getElementById('main');
    switch (state.page) {
      case 'dashboard':   main.innerHTML = renderDashboard();   break;
      case 'tasks':       main.innerHTML = renderTasks();       break;
      case 'performance': main.innerHTML = renderPerformance(); break;
      case 'resources':   main.innerHTML = renderResources();   break;
      case 'completed':   main.innerHTML = renderCompleted();   break;
      case 'recurring':   main.innerHTML = renderRecurring();   break;
    }
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  fetchAll();
  setInterval(fetchAll, 60000);
</script>
</body>
</html>
