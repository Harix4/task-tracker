<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskr</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0071e3">
  <link rel="manifest" href="/manifest.json">
  <style>
    /* ── Light mode (default) ─────────────────────────────────────── */
    :root {
      --radius: 16px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
      /* Brand accent colors (same in both modes) */
      --blue: #0071e3;
      --green: #34c759;
      --red: #ff3b30;
      --orange: #ff9500;
      --purple: #bf5af2;
      --pink: #ff375f;
      --teal: #5ac8fa;
      /* Light surface palette */
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 2px 20px rgba(0,0,0,0.06);
      --text: #1d1d1f;
      --muted: #6e6e73;
      /* Component tokens — light */
      --nav-hover: rgba(0,0,0,0.04);
      --nav-active-bg: rgba(0,113,227,0.09);
      --nav-active-text: #0071e3;
      --row-hover: rgba(0,0,0,0.03);
      --input-bg: rgba(0,0,0,0.05);
      --input-focus: rgba(0,0,0,0.08);
      --option-bg: #ffffff;
      --option-text: #000000;
      --panel-close-bg: rgba(0,0,0,0.06);
      --panel-close-hover: rgba(0,0,0,0.12);
      --bar-track: rgba(0,0,0,0.07);
      --field-bg: rgba(0,0,0,0.04);
      --field-focus: rgba(0,113,227,0.04);
      --th-border: rgba(0,0,0,0.07);
      --td-border: rgba(0,0,0,0.05);
      --td-bg: transparent;
      --tr-hover: rgba(0,0,0,0.03);
      --kb-card-bg: #ffffff;
      --kb-card-hover: rgba(0,0,0,0.04);
      --kb-col-bg: rgba(0,0,0,0.04);
      --kb-col-header-bg: #ebebeb;
      --kb-footer-border: rgba(0,0,0,0.05);
      --kb-add-hover: rgba(0,0,0,0.04);
      --kb-move-btn: rgba(0,0,0,0.05);
      --kb-move-hover: rgba(0,0,0,0.09);
      --seg-btn: rgba(0,0,0,0.05);
      --seg-btn-hover: rgba(0,0,0,0.09);
      --view-btn: rgba(0,0,0,0.05);
      --view-btn-hover: rgba(0,0,0,0.09);
      --view-btn-active: rgba(0,0,0,0.11);
      --view-active-text: #1d1d1f;
      --res-card-bg: rgba(0,0,0,0.025);
      --res-card-hover: rgba(0,0,0,0.05);
      --res-title: #1d1d1f;
      --rem-pill: rgba(0,0,0,0.06);
      --rem-pill-hover: rgba(0,0,0,0.10);
      --tab-active: rgba(0,0,0,0.08);
      --tab-hover: rgba(0,0,0,0.04);
      --rc-card-hover-border: rgba(0,0,0,0.18);
      --rc-dot-inactive: rgba(0,0,0,0.18);
      --menu-bg: #ffffff;
      --menu-border: rgba(0,0,0,0.12);
      --menu-shadow: 0 8px 32px rgba(0,0,0,0.16);
      --menu-item-hover: rgba(0,0,0,0.05);
      --dow-btn-border: rgba(0,0,0,0.12);
      --pp-border: rgba(0,0,0,0.12);
      --pp-bg: rgba(0,0,0,0.02);
      --pp-hover-border: rgba(0,0,0,0.25);
      --pp-hover-bg: rgba(0,0,0,0.05);
      --av-overflow: rgba(0,0,0,0.12);
      --av-overflow-text: var(--muted);
      --sidebar-user-bg: rgba(0,0,0,0.03);
      --sidebar-action-hover: rgba(0,0,0,0.07);
      --completed-stat-bg: rgba(0,0,0,0.03);
      --completed-stat-border: rgba(0,0,0,0.06);
      --res-item-border: rgba(0,0,0,0.08);
      --res-item-bg: rgba(0,0,0,0.02);
      --kb-done-badge: rgba(0,0,0,0.08);
      --kb-count-bg: rgba(0,0,0,0.10);
      --cb-border: rgba(0,0,0,0.25);
      --cb-hover-bg: rgba(0,0,0,0.06);
    }

    /* ── Dark mode ────────────────────────────────────────────────── */
    body.dark {
      --bg: #000000;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --shadow: 0 2px 20px rgba(0,0,0,0.50);
      --text: #ffffff;
      --muted: #98989d;
      --nav-hover: rgba(255,255,255,0.07);
      --nav-active-bg: rgba(0,113,227,0.20);
      --nav-active-text: #ffffff;
      --row-hover: rgba(255,255,255,0.03);
      --input-bg: rgba(255,255,255,0.08);
      --input-focus: rgba(255,255,255,0.13);
      --option-bg: #1c1c1e;
      --option-text: #f5f5f7;
      --panel-close-bg: rgba(255,255,255,0.09);
      --panel-close-hover: rgba(255,255,255,0.16);
      --bar-track: rgba(255,255,255,0.09);
      --field-bg: rgba(255,255,255,0.06);
      --field-focus: rgba(0,113,227,0.12);
      --th-border: rgba(255,255,255,0.08);
      --td-border: rgba(255,255,255,0.05);
      --td-bg: rgba(255,255,255,0.03);
      --tr-hover: rgba(255,255,255,0.06);
      --kb-card-bg: rgba(255,255,255,0.055);
      --kb-card-hover: rgba(255,255,255,0.09);
      --kb-col-bg: rgba(255,255,255,0.03);
      --kb-col-header-bg: rgba(255,255,255,0.04);
      --kb-footer-border: rgba(255,255,255,0.07);
      --kb-add-hover: rgba(255,255,255,0.06);
      --kb-move-btn: rgba(255,255,255,0.06);
      --kb-move-hover: rgba(255,255,255,0.13);
      --seg-btn: rgba(255,255,255,0.06);
      --seg-btn-hover: rgba(255,255,255,0.12);
      --view-btn: rgba(255,255,255,0.06);
      --view-btn-hover: rgba(255,255,255,0.10);
      --view-btn-active: rgba(255,255,255,0.14);
      --view-active-text: #f5f5f7;
      --res-card-bg: rgba(255,255,255,0.055);
      --res-card-hover: rgba(255,255,255,0.09);
      --res-title: #f5f5f7;
      --rem-pill: rgba(255,255,255,.08);
      --rem-pill-hover: rgba(255,255,255,.14);
      --tab-active: rgba(255,255,255,.12);
      --tab-hover: rgba(255,255,255,.06);
      --rc-card-hover-border: rgba(255,255,255,0.22);
      --rc-dot-inactive: rgba(255,255,255,0.28);
      --menu-bg: #2c2c2e;
      --menu-border: rgba(255,255,255,0.15);
      --menu-shadow: 0 8px 32px rgba(0,0,0,0.55);
      --menu-item-hover: rgba(255,255,255,0.08);
      --dow-btn-border: rgba(255,255,255,0.12);
      --pp-border: rgba(255,255,255,0.12);
      --pp-bg: rgba(255,255,255,0.04);
      --pp-hover-border: rgba(255,255,255,0.28);
      --pp-hover-bg: rgba(255,255,255,0.07);
      --av-overflow: rgba(255,255,255,0.18);
      --av-overflow-text: #98989d;
      --sidebar-user-bg: rgba(255,255,255,.04);
      --sidebar-action-hover: rgba(255,255,255,.08);
      --completed-stat-bg: rgba(255,255,255,0.04);
      --completed-stat-border: rgba(255,255,255,0.08);
      --res-item-border: rgba(255,255,255,.08);
      --res-item-bg: rgba(255,255,255,.02);
      --kb-done-badge: rgba(255,255,255,0.08);
      --kb-count-bg: rgba(255,255,255,0.07);
      --cb-border: rgba(255,255,255,0.22);
      --cb-hover-bg: rgba(255,255,255,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { border: none; cursor: pointer; font-family: inherit; background: none; }
    select { font-family: inherit; }

    /* ── Layout ─────────────────────────────────────────────── */
    .layout {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      padding: 20px 12px 16px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .nav-item:hover { background: var(--nav-hover); color: var(--text); }
    .nav-item.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-text);
      font-weight: 600;
      border-left: 3px solid var(--blue);
      padding-left: 9px;
    }
    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 12px 20px;
    }
    .sidebar-brand-text {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .theme-toggle-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--nav-hover);
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; padding: 0;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }
    .theme-toggle-btn:hover { background: var(--tab-active); color: var(--text); }

    .sidebar-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 4px 0;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .ws-info { display: flex; align-items: center; gap: 8px; }
    .ws-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--blue); color: #fff;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ws-name { font-size: 12px; font-weight: 500; color: var(--muted); }

    .refresh-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
    }
    .refresh-dot.pulse {
      animation: dot-pulse 0.9s ease-out forwards;
    }
    @keyframes dot-pulse {
      0%   { transform: scale(1);   box-shadow: 0 0 0 0 rgba(52,199,89,.7); }
      50%  { transform: scale(1.3); box-shadow: 0 0 0 5px rgba(52,199,89,0); }
      100% { transform: scale(1);   box-shadow: 0 0 0 0 rgba(52,199,89,0); }
    }

    /* ── Main ───────────────────────────────────────────────── */
    #main {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 32px 36px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    /* ── Cards ──────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .card-header {
      padding: 15px 20px 13px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .card-body { padding: 4px 0; }

    /* ── Metric cards ───────────────────────────────────────── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 20px 22px;
    }

    .metric-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 34px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .metric-value.danger { color: var(--red); }

    /* ── Dashboard columns ──────────────────────────────────── */
    .dash-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── Task list rows ─────────────────────────────────────── */
    .task-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 20px;
      min-height: 52px;
      transition: background 0.1s, border-left-color 0.1s;
      border-left: 3px solid transparent;
    }
    .task-row:hover {
      background: var(--row-hover);
      border-left-color: var(--blue);
    }

    .avatar {
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 700;
    }

    .task-info { flex: 1; min-width: 0; }
    .task-name {
      font-size: 13.5px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

    /* ── Pills ──────────────────────────────────────────────── */
    .pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 9px;
      border-radius: 100px;
      font-size: 11.5px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pill-ads        { background: rgba(191,90,242,.12); color: var(--purple); }
    .pill-fulfillment{ background: rgba(0,113,227,.12);  color: var(--blue); }
    .pill-creative   { background: rgba(255,55,95,.12);  color: var(--pink); }
    .pill-finance    { background: rgba(52,199,89,.12);  color: var(--green); }
    .pill-operations { background: rgba(255,149,0,.12);  color: var(--orange); }

    .status-pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      color: #fff;
    }
    .s-not-started { background: #3a3a3c; }
    .s-in-progress { background: #0071e3; }
    .s-in-review   { background: #ff9500; }
    .s-complete    { background: #34c759; }
    .s-blocked     { background: #ff3b30; }

    /* Priority dot */
    .p-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .p-high   { background: var(--red); }
    .p-medium { background: var(--orange); }
    .p-low    { background: var(--green); }

    /* ── Filter bar ─────────────────────────────────────────── */
    .filter-bar { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-tab {
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }
    .filter-tab:hover { background: var(--nav-hover); color: var(--text); }
    .filter-tab.active { background: var(--blue); color: #fff; }

    .search-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .search-input, .cat-select {
      height: 36px;
      padding: 0 12px;
      border: none;
      border-radius: 10px;
      background: var(--input-bg);
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: background 0.1s;
    }
    .search-input:focus, .cat-select:focus { background: var(--input-focus); }
    .search-input { flex: 1; }
    .cat-select { min-width: 160px; }
    .cat-select option { background: var(--option-bg); color: var(--option-text); }

    /* ── Table ──────────────────────────────────────────────── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }

    th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 0.5px solid var(--th-border);
      background: transparent;
      white-space: nowrap;
    }
    th.th-cb { width: 48px; padding-right: 0; }

    td {
      padding: 0 16px;
      height: 52px;
      border-bottom: 0.5px solid var(--td-border);
      color: var(--text);
      vertical-align: middle;
      background: var(--td-bg);
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { cursor: pointer; transition: background 0.08s; }
    tbody tr:hover td { background: var(--tr-hover); }

    .res-link-icon { color: var(--blue); font-size: 13px; }
    .sop-link-icon { color: var(--blue); font-size: 15px; }
    .sop-dash { color: var(--muted); }
    .td-task { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 15px; font-weight: 600; color: var(--text); }
    .td-assignee { display: flex; align-items: center; gap: 8px; }
    .td-cb { width: 48px; padding-right: 0; }

    /* ── Task checkbox ──────────────────────────────────────────── */
    .task-cb {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--cb-border);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
      padding: 0;
      flex-shrink: 0;
    }
    .task-cb:hover { border-color: var(--blue); background: var(--cb-hover-bg); }
    .task-cb.checked { background: var(--green); border-color: var(--green); }
    .cb-check {
      width: 13px; height: 10px;
      opacity: 0; transform: scale(0.5);
      transition: opacity 0.15s, transform 0.15s;
      pointer-events: none;
    }
    .task-cb.checked .cb-check { opacity: 1; transform: scale(1); }
    /* Done row fade-out animation */
    @keyframes row-done {
      0%   { opacity: 1; }
      30%  { opacity: 1; background: rgba(52,199,89,0.08); }
      100% { opacity: 0; height: 0; padding: 0; overflow: hidden; }
    }
    tr.row-completing { animation: row-done 0.8s ease forwards; pointer-events: none; }
    tr.row-completing .td-task { text-decoration: line-through; color: var(--muted); }
    @keyframes cb-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }
    .task-cb.popping { animation: cb-pop 0.22s ease; }

    /* ── Overlay + Panel ────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.30);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }

    .panel {
      position: fixed; top: 0; right: 0;
      width: 480px; height: 100vh;
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 32px rgba(0,0,0,0.12);
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.26s cubic-bezier(0.32, 0, 0.12, 1);
      display: flex;
      flex-direction: column;
    }
    .panel.open { transform: translateX(0); }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .panel-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      line-height: 1.3;
    }
    .panel-close {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--panel-close-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--muted);
      flex-shrink: 0; margin-top: 1px;
      transition: background 0.1s;
    }
    .panel-close:hover { background: var(--panel-close-hover); }
    .panel-body { flex: 1; overflow-y: auto; padding: 20px; }

    .d-section { margin-bottom: 20px; }
    .d-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .d-value { font-size: 13.5px; color: var(--text); }
    .d-sop-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--blue);
      font-size: 13.5px;
      font-weight: 500;
    }
    .d-sop-link:hover { text-decoration: underline; }

    /* ── Performance ────────────────────────────────────────── */
    .leaderboard {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 16px 20px 14px;
      min-width: 130px;
      text-align: center;
    }
    .podium-item.rank-1 { padding-top: 24px; }

    .medal { font-size: 26px; line-height: 1; }
    .podium-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .podium-rate { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }

    .rate-cell { display: flex; align-items: center; gap: 10px; }
    .rate-pct { font-weight: 600; font-size: 13px; min-width: 38px; text-align: right; }
    .rate-bar-bg {
      flex: 1; height: 4px;
      background: var(--bar-track);
      border-radius: 100px; overflow: hidden;
    }
    .rate-bar-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 100px;
      transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Resources page ─────────────────────────────────────── */
    .res-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .res-section-title { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .res-card {
      background: var(--res-card-bg); border: 0.5px solid var(--border);
      border-radius: 14px; padding: 18px; cursor: pointer;
      transition: background 0.14s; display: flex; flex-direction: column; gap: 8px;
    }
    .res-card:hover { background: var(--res-card-hover); }
    .res-card-title { font-size: 15px; font-weight: 600; color: var(--res-title); }
    .res-card-preview { font-size: 13px; color: var(--muted); line-height: 1.45; min-height: 36px; flex: 1; }
    .res-card-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .res-card-date { font-size: 11px; color: var(--muted); margin-left: auto; }
    .res-textarea { min-height: 220px; resize: vertical; font-size: 13px; line-height: 1.65; }
    .view-plan-btn { margin-top: 8px; padding: 8px 14px; border-radius: 8px; background: rgba(0,113,227,0.12); color: var(--blue); border: none; cursor: pointer; font-size: 13px; font-weight: 500; width: 100%; transition: background 0.12s; text-align: left; }
    .view-plan-btn:hover { background: rgba(0,113,227,0.22); }
    .back-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 0 0 14px; display: flex; align-items: center; gap: 4px; }
    .back-btn:hover { color: var(--text); }
    .delete-resource-btn { padding: 10px 16px; border-radius: 10px; background: rgba(255,59,48,0.1); color: var(--red); border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.12s; flex-shrink: 0; }
    .delete-resource-btn:hover { background: rgba(255,59,48,0.2); }
    .res-icon { font-size: 12px; opacity: 0.6; }

    /* ── Empty / loading ────────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      gap: 6px;
    }
    .empty-icon { font-size: 30px; margin-bottom: 2px; }

    /* ── New-task button ────────────────────────────────────── */
    .new-task-btn {
      height: 36px;
      padding: 0 16px;
      background: var(--blue);
      color: #fff;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      border: none;
      transition: opacity 0.1s;
      flex-shrink: 0;
    }
    .new-task-btn:hover { opacity: 0.85; }

    /* ── Create-task form ───────────────────────────────────── */
    .form-field { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--field-bg);
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.12s, background 0.12s;
      appearance: none;
    }
    .form-input:focus { border-color: var(--blue); background: var(--field-focus); }
    select.form-input { cursor: pointer; }
    .form-hint { font-size: 11.5px; color: var(--muted); margin-top: 4px; }

    .submit-btn {
      display: block;
      width: 100%;
      height: 40px;
      margin-top: 8px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .form-error {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(255,59,48,0.08);
      border: 1px solid rgba(255,59,48,0.2);
      border-radius: 10px;
      font-size: 12.5px;
      color: var(--red);
    }

    /* ── View toggle ────────────────────────────────────────────── */
    .view-toggle { display: flex; gap: 3px; }
    .view-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--view-btn);
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      border: none;
      padding: 0;
    }
    .view-btn:hover { background: var(--view-btn-hover); color: var(--text); }
    .view-btn.active { background: var(--view-btn-active); color: var(--view-active-text); }
    .view-btn svg { width: 15px; height: 15px; }

    /* ── Kanban board ───────────────────────────────────────────── */
    .kb-board {
      display: flex; gap: 12px; overflow-x: auto;
      padding-bottom: 24px; align-items: flex-start;
    }
    .kb-board::-webkit-scrollbar { height: 5px; }
    .kb-board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }

    .kb-col { flex-shrink: 0; width: 280px; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; }
    .kb-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px 10px;
      background: var(--kb-col-header-bg);
    }
    .kb-col-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .kb-col-count {
      font-size: 11.5px; color: var(--muted);
      background: var(--kb-count-bg);
      padding: 1px 8px; border-radius: 100px;
    }
    .kb-col-body {
      display: flex; flex-direction: column; gap: 8px;
      min-height: 60px;
      background: var(--kb-col-bg);
      padding: 8px;
    }
    .kb-col-footer { background: var(--kb-col-bg); padding: 4px 6px 8px; }

    .kb-card {
      background: var(--kb-card-bg);
      border: 0.5px solid var(--border);
      border-radius: 12px; padding: 16px;
      cursor: pointer; position: relative;
      transition: background 0.15s, opacity 0.25s;
    }
    .kb-card:hover { background: var(--kb-card-hover); }
    .kb-card.overdue { border-left: 2px solid #ff3b30; }
    .kb-card.kb-done { opacity: 0.6; }

    .kb-card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px; margin-bottom: 10px;
    }
    .kb-card-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.35; flex: 1; }
    .kb-done-badge {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      background: #34c759; display: flex; align-items: center; justify-content: center;
    }
    .kb-done-badge svg { width: 10px; height: 9px; }
    .kb-assignee-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .kb-assignee { font-size: 12px; color: var(--muted); }
    .kb-meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .kb-due { font-size: 12px; color: var(--muted); }
    .kb-due.kb-overdue { color: var(--red); font-weight: 600; }
    .kb-card-footer {
      display: flex; align-items: center; justify-content: flex-end;
      border-top: 0.5px solid var(--kb-footer-border);
      padding-top: 10px; margin-top: 2px;
    }
    .kb-move-btn {
      font-size: 12px; color: var(--muted);
      background: var(--kb-move-btn); border: none; cursor: pointer;
      padding: 4px 10px; border-radius: 6px;
      transition: background 0.12s, color 0.12s; position: relative;
    }
    .kb-move-btn:hover { background: var(--kb-move-hover); color: var(--text); }
    .kb-move-menu {
      position: fixed;
      background: var(--menu-bg); border: 0.5px solid var(--menu-border);
      border-radius: 10px; box-shadow: var(--menu-shadow);
      z-index: 2000; min-width: 150px; overflow: hidden;
      animation: menuIn 0.12s ease;
    }
    @keyframes menuIn { from { opacity:0; transform:scale(0.95) translateY(4px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .kb-move-item {
      display: block; width: 100%; text-align: left;
      padding: 10px 14px; font-size: 13px; color: var(--text);
      background: none; border: none; cursor: pointer; transition: background 0.1s;
    }
    .kb-move-item:hover { background: var(--menu-item-hover); }
    .kb-move-item.current { color: var(--muted); cursor: default; }
    .kb-move-item.current:hover { background: none; }
    .kb-add-btn {
      width: 100%; padding: 9px 14px; border-radius: 8px;
      font-size: 12px; color: var(--muted);
      background: none; border: none; cursor: pointer; text-align: left;
      transition: background 0.12s, color 0.12s;
    }
    .kb-add-btn:hover { background: var(--kb-add-hover); color: var(--text); }
    .kb-empty { font-size: 12px; color: var(--muted); padding: 16px 4px; text-align: center; }

    /* Segmented status control in detail panel */
    .status-seg { display: flex; gap: 4px; flex-wrap: wrap; }
    .status-seg-btn {
      flex: 1; min-width: 72px; padding: 8px 4px; border-radius: 8px;
      font-size: 12px; font-weight: 500; text-align: center;
      background: var(--seg-btn); border: none; cursor: pointer;
      color: var(--muted); transition: background 0.14s, color 0.14s; white-space: nowrap;
    }
    .status-seg-btn:hover { background: var(--seg-btn-hover); color: var(--text); }
    .status-seg-btn.seg-active { background: #0071e3; color: #fff; }
    .status-seg-btn.seg-active.s-done { background: #34c759; }
    .status-seg-btn.seg-active.s-blocked { background: #ff3b30; }
    .status-seg-btn.seg-active.s-review { background: #ff9500; }
    .status-seg-btn.seg-active.s-todo { background: var(--border); color: var(--text); }

    /* ── Completed page ─────────────────────────────────────────── */
    .completed-stats {
      display: flex; gap: 12px; margin-bottom: 24px;
    }
    .completed-stat {
      background: var(--completed-stat-bg); border: 0.5px solid var(--completed-stat-border);
      border-radius: 14px; padding: 16px 22px; min-width: 140px;
    }
    .completed-stat-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .completed-stat-value { font-size: 28px; font-weight: 700; color: #34c759; }
    .restore-btn {
      font-size: 12px; color: var(--blue);
      background: rgba(0,113,227,0.1); border: none; cursor: pointer;
      padding: 4px 12px; border-radius: 6px; white-space: nowrap;
      transition: background 0.12s;
    }
    .restore-btn:hover { background: rgba(0,113,227,0.2); }
    .restore-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    tr.completed-row td { opacity: 0.65; }
    tr.completed-row .td-task-done { text-decoration: line-through; color: var(--muted); }

    /* ── Resource doc icon (kanban) ─────────────────────────────── */
    .kb-res-icon { font-size: 11px; opacity: 0.55; margin-left: auto; }

    /* ── Reminder pills ─────────────────────────────────────────── */
    .rem-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .rem-pill {
      font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 100px;
      border: none; cursor: pointer; font-family: var(--font);
      background: var(--rem-pill); color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }
    .rem-pill:hover { background: var(--rem-pill-hover); color: var(--text); }
    .rem-pill-active { background: #0071e3 !important; color: #fff !important; }
    .reminder-active-pill {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12.5px; font-weight: 500;
      color: var(--orange); background: rgba(255,149,0,.12);
      border: 1px solid rgba(255,149,0,.25); border-radius: 100px;
      padding: 5px 14px;
    }
    .reminder-cancel-btn {
      background: none; border: none; cursor: pointer;
      color: var(--orange); font-size: 15px; line-height: 1;
      padding: 0 0 0 2px; font-family: var(--font);
    }
    .reminder-cancel-btn:hover { color: var(--red); }
    .rem-overdue-warning {
      margin-top: 8px; font-size: 12px; color: #ff9500;
      background: rgba(255,149,0,.1); border: 1px solid rgba(255,149,0,.25);
      border-radius: 8px; padding: 6px 10px; line-height: 1.4;
    }

    /* ── Recurring tasks page ───────────────────────────────────── */
    .rc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; margin-top: 16px; }
    .rc-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
      transition: border-color 0.15s, opacity 0.2s;
    }
    .rc-card:hover { border-color: var(--rc-card-hover-border); }
    .rc-card.rc-paused { opacity: 0.5; }
    .rc-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .rc-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.3; }
    .rc-menu-btn {
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 18px; padding: 0 4px; line-height: 1; border-radius: 5px;
      flex-shrink: 0; font-family: var(--font);
    }
    .rc-menu-btn:hover { color: var(--text); background: var(--nav-hover); }
    .rc-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .freq-badge {
      font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px;
      background: rgba(10,132,255,0.15); color: #0a84ff; letter-spacing: 0.02em;
    }
    .rc-status { display: flex; align-items: center; gap: 5px; margin-top: 10px; }
    .rc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .rc-dot.rc-active { background: #34c759; }
    .rc-dot.rc-inactive { background: var(--rc-dot-inactive); }
    .rc-status-label { font-size: 12px; color: var(--muted); }
    .rc-next { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .rc-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .rc-empty-icon { font-size: 36px; margin-bottom: 12px; }

    /* DOW / DOM pickers */
    .dow-picker { display: flex; gap: 4px; flex-wrap: wrap; }
    .dow-btn {
      padding: 4px 9px; border-radius: 6px; font-size: 12px; font-weight: 500;
      border: 1.5px solid var(--dow-btn-border); background: none;
      color: var(--muted); cursor: pointer; font-family: var(--font);
      transition: all 0.12s;
    }
    .dow-btn.selected { border-color: #0071e3; background: rgba(0,113,227,0.15); color: var(--text); }

    /* ── People picker ──────────────────────────────────────────── */
    .people-picker { display: flex; flex-wrap: wrap; gap: 6px; }
    .person-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 10px 5px 5px; border-radius: 20px;
      border: 1.5px solid var(--pp-border);
      background: var(--pp-bg);
      cursor: pointer; font-size: 13px; color: var(--text);
      font-family: var(--font);
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .person-pill:hover { border-color: var(--pp-hover-border); background: var(--pp-hover-bg); }
    .person-pill.pp-selected { border-color: #0071e3; background: rgba(0,113,227,0.12); }
    .pp-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      font-size: 9px; font-weight: 700; color: white; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .pp-check { color: #0071e3; font-size: 11px; line-height: 1; font-weight: 700; }

    /* ── Avatar stack ────────────────────────────────────────────── */
    .av-stack { display: flex; align-items: center; }
    .av-stack .av {
      width: 22px; height: 22px; border-radius: 50%;
      font-size: 8px; font-weight: 700; color: white;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--bg); margin-left: -5px; flex-shrink: 0;
    }
    .av-stack .av:first-child { margin-left: 0; }
    .av-overflow { background: var(--av-overflow) !important; color: var(--av-overflow-text) !important; }

    /* ── Panel tabs ──────────────────────────────────────────────── */
    .panel-tabs { display: flex; gap: 2px; margin-bottom: 12px; }
    .panel-tab {
      font-size: 13px; color: var(--muted); background: none;
      border: none; cursor: pointer; padding: 5px 10px; border-radius: 100px;
      display: inline-flex; align-items: center; gap: 5px; font-family: var(--font);
      transition: background 0.1s, color 0.1s;
    }
    .panel-tab.active { background: var(--tab-active); color: var(--text); font-weight: 500; }
    .panel-tab:hover:not(.active) { background: var(--tab-hover); color: var(--text); }
    .tab-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }

    /* ── Inline task resources ───────────────────────────────────── */
    .res-item-card {
      border: 1px solid var(--res-item-border); border-radius: 10px;
      padding: 12px; margin-bottom: 10px; background: var(--res-item-bg);
    }
    .del-res-btn {
      font-size: 11px; color: var(--red); background: none; border: none;
      cursor: pointer; padding: 2px 4px; border-radius: 4px; flex-shrink: 0;
      transition: background 0.1s;
    }
    .del-res-btn:hover { background: rgba(255,59,48,.12); }
    .add-res-btn {
      font-size: 12.5px; color: var(--blue);
      background: rgba(10,132,255,.10); border: 1px solid rgba(10,132,255,.20);
      border-radius: 8px; padding: 6px 12px; cursor: pointer;
      font-family: var(--font); transition: background 0.1s; margin-top: 4px;
    }
    .add-res-btn:hover { background: rgba(10,132,255,.18); }

    /* ── Panel save button ──────────────────────────────────────── */
    .panel-save-btn {
      display: block; width: 100%; height: 40px;
      margin-top: 6px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 10px;
      font-family: var(--font); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.1s, background 0.25s;
    }
    .panel-save-btn:hover { opacity: 0.85; }
    .panel-save-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Login screen ───────────────────────────────────────────── */
    .login-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      text-align: center; width: 100%; max-width: 480px; padding: 0 24px;
    }
    .login-logo {
      font-size: 36px; font-weight: 700; letter-spacing: -0.04em;
      color: var(--text); margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: 15px; color: var(--muted); margin-bottom: 32px;
    }
    .login-members {
      display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
    }
    .login-member-card {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      width: 130px; padding: 16px 8px; border-radius: 14px;
      background: var(--surface); border: 1.5px solid var(--border);
      cursor: pointer; transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .login-member-card:hover {
      border-color: var(--blue); transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,113,227,.18);
    }
    .login-member-card.selected { border-color: var(--blue); background: rgba(0,113,227,.06); }
    .login-member-name {
      font-size: 13px; font-weight: 600; color: var(--text);
    }
    .login-member-role {
      font-size: 11px; color: var(--muted); margin-top: -4px;
    }

    /* ── PIN pad ────────────────────────────────────────────────── */
    .login-pin-section { margin-top: 28px; }
    .login-selected-name {
      font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 20px;
    }
    .pin-dots {
      display: flex; gap: 14px; justify-content: center; margin-bottom: 20px;
    }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--muted); transition: background 0.15s, border-color 0.15s;
    }
    .pin-dot.filled { background: var(--blue); border-color: var(--blue); }
    .pin-pad {

      { page: 'completed', label: 'Completed' },
    ],
  };

  function renderNav() {
    const role  = state.user?.role || 'member';
    const items = NAV_ITEMS[role] || NAV_ITEMS.member;
    document.getElementById('sidebarNav').innerHTML = items.map(({ page, label }) =>
      `<div class="nav-item${state.page === page ? ' active' : ''}" data-page="${page}" onclick="navigate('${page}')">
        ${NAV_ICONS[page] || ''}${label}
      </div>`
    ).join('');
  }

  function renderSidebarUser() {
    const u = state.user;
    if (!u) { document.getElementById('sidebarUser').innerHTML = ''; return; }
    document.getElementById('sidebarUser').innerHTML = `
      <div class="sidebar-user">
        ${avatarHtml(u.username, 30)}
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">${esc(u.displayName || u.username)}</div>
          <div class="sidebar-user-role">${u.role === 'admin' ? 'Admin' : 'Member'}</div>
        </div>
        <div class="sidebar-user-actions">
          <button class="sidebar-action-btn" onclick="openPinModal()" title="Change PIN">🔑</button>
          <button class="sidebar-action-btn" onclick="logout()" title="Logout">↩</button>
        </div>
      </div>`;
  }

  // ── Auth flow ──────────────────────────────────────────────────────────────
  function showLoginScreen() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appLayout').style.display   = 'none';
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appLayout').style.display   = 'flex';
    updateThemeIcon();
  }

  function logout() {
    clearToken();
    state.user = null;
    showLoginScreen();
  }

  // ── Login screen rendering ─────────────────────────────────────────────────
  let loginMembers  = [];
  let selectedMember = null;
  let pinDigits     = [];

  async function initLoginScreen() {
    const res  = await fetch('/auth/members').then(r => r.json()).catch(() => ({ members: [] }));
    loginMembers = res.members || [];
    document.getElementById('loginMembers').innerHTML = loginMembers.map(m =>
      `<div class="login-member-card" data-username="${esc(m.username)}" onclick="selectMember('${esc(m.username)}')">
        ${avatarHtml(m.username, 44)}
        <div class="login-member-name">${esc(m.displayName)}</div>
        ${m.role === 'admin' ? '<div class="login-member-role" style="color:var(--blue);font-weight:600;font-size:10px;letter-spacing:.04em;text-transform:uppercase">Admin</div>' : ''}
      </div>`
    ).join('');
    renderPinPad();
  }

  function renderPinPad() {
    const keys = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];
    document.getElementById('pinPad').innerHTML = keys.map(k =>
      k === '' ? `<button class="pin-key pin-empty" disabled></button>`
               : `<button class="pin-key" onclick="pinKey('${k}')">${k}</button>`
    ).join('');
  }

  function selectMember(username) {
    selectedMember = username;
    pinDigits = [];
    document.getElementById('pinError').textContent = '';
    document.getElementById('loginSelectedName').textContent =
      loginMembers.find(m => m.username === username)?.displayName || username;
    document.querySelectorAll('.login-member-card').forEach(c =>
      c.classList.toggle('selected', c.dataset.username === username)
    );
    document.getElementById('loginMembers').style.display     = 'none';
    document.getElementById('loginPinSection').style.display  = 'block';
    updatePinDots();
  }

  function backToMembers() {
    selectedMember = null;
    pinDigits = [];
    document.getElementById('loginMembers').style.display     = 'flex';
    document.getElementById('loginPinSection').style.display  = 'none';
  }

  function pinKey(k) {
    if (k === '⌫') {
      pinDigits.pop();
    } else if (pinDigits.length < 4) {
      pinDigits.push(String(k));
    }
    updatePinDots();
    document.getElementById('pinError').textContent = '';
    if (pinDigits.length === 4) submitPin();
  }

  function updatePinDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById(`pd${i}`)?.classList.toggle('filled', i < pinDigits.length);
    }
  }

  async function submitPin() {
    if (!selectedMember || pinDigits.length < 4) return;
    const pin = pinDigits.join('');
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    try {
      const res  = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: selectedMember, pin, timezone }),
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('pinError').textContent = data.error || 'Incorrect PIN';
        pinDigits = [];
        updatePinDots();
        return;
      }
      setToken(data.token);
      state.user = parseJWT(data.token);
      // Persist timezone locally
      localStorage.setItem(TZ_KEY, data.timezone || timezone);

      if (data.setupRequired) {
        _setupTz = data.timezone || timezone;
        await showSetupFlow();
      } else {
        showApp();
        renderNav();
        renderSidebarUser();
        await fetchAll();
      }
    } catch (err) {
      document.getElementById('pinError').textContent = 'Login failed';
      pinDigits = [];
      updatePinDots();
    }
  }

  // ── PIN change modal ───────────────────────────────────────────────────────
  let pinModalTarget = null; // null = self, string = admin changing someone else

  function openPinModal(targetUsername = null) {
    pinModalTarget = targetUsername;
    const isOther  = targetUsername && targetUsername !== state.user?.username;
    document.getElementById('pinModalTarget').textContent = isOther
      ? `Changing PIN for: ${targetUsername}` : '';
    document.getElementById('pinCurrent').value  = '';
    document.getElementById('pinNew').value      = '';
    document.getElementById('pinConfirm').value  = '';
    document.getElementById('pinModalError').textContent = '';
    // If admin changing someone else, hide current PIN field
    document.getElementById('pinCurrent').closest('.form-field').style.display =
      isOther ? 'none' : '';
    document.getElementById('pinModal').style.display = 'flex';
  }

  function closePinModal() {
    document.getElementById('pinModal').style.display = 'none';
    pinModalTarget = null;
  }

  async function submitPinChange() {
    const currentPin = document.getElementById('pinCurrent').value.trim();
    const newPin     = document.getElementById('pinNew').value.trim();
    const confirmPin = document.getElementById('pinConfirm').value.trim();
    const errEl      = document.getElementById('pinModalError');
    errEl.textContent = '';

    if (!/^\d{4}$/.test(newPin)) { errEl.textContent = 'PIN must be 4 digits'; return; }
    if (newPin !== confirmPin)    { errEl.textContent = 'PINs do not match'; return; }

    const body = { newPin };
    if (pinModalTarget && pinModalTarget !== state.user?.username) {
      body.targetUsername = pinModalTarget;
    } else {
      if (!currentPin) { errEl.textContent = 'Enter your current PIN'; return; }
      body.currentPin = currentPin;
    }

    try {
      const res  = await authFetch('/auth/pin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Failed'; return; }
      closePinModal();
    } catch (err) {
      errEl.textContent = 'Request failed';
    }
  }

  // ── Startup auth check ─────────────────────────────────────────────────────
  async function checkAuth() {
    const token = getToken();
    if (token) {
      const user = parseJWT(token);
      // Invalidate tokens that still carry the old 'Admin' display name
      if (user && user.displayName === 'Admin') {
        clearToken();
        showLoginScreen();
        await initLoginScreen();
        return;
      }
      if (user) {
        state.user = user;
        // Ensure timezone is in localStorage (may be missing on first boot)
        if (!localStorage.getItem(TZ_KEY)) {
          localStorage.setItem(TZ_KEY, Intl.DateTimeFormat().resolvedOptions().timeZone);
        }
        showApp();
        renderNav();
        renderSidebarUser();
        await fetchAll();
        return;
      }
    }
    showLoginScreen();
    await initLoginScreen();
  }

  // ── Theme ──────────────────────────────────────────────────────────────────
  const THEME_KEY = 'taskr_theme';

  function initTheme() {
    const saved = localStorage.getItem(THEME_KEY) || 'dark';
    document.body.className = saved;
    updateThemeIcon();
  }

  function toggleTheme() {
    const isDark = document.body.classList.contains('dark');
    const next   = isDark ? 'light' : 'dark';
    document.body.className = next;
    localStorage.setItem(THEME_KEY, next);
    updateThemeIcon();
  }

  function updateThemeIcon() {
    const btn = document.getElementById('themeToggle');
    if (!btn) return;
    const isDark = document.body.classList.contains('dark');
    // Sun shown in dark mode (click → go light); Moon shown in light mode (click → go dark)
    btn.innerHTML = isDark
      ? `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><circle cx="10" cy="10" r="3.5"/><path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"/></svg>`
      : `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M17.5 11.5A8 8 0 018.5 2.5a8 8 0 000 15 8 8 0 009-6z"/></svg>`;
  }

  // ── First-time setup flow ─────────────────────────────────────────────────
  const SETUP_DONE_KEY = 'taskr_setup_done';

  const TIMEZONE_OPTIONS = [
    { region: 'Americas', zones: [
      { label: 'Los Angeles (PST/PDT)',  tz: 'America/Los_Angeles' },
      { label: 'New York (EST/EDT)',      tz: 'America/New_York' },
      { label: 'Chicago (CST/CDT)',       tz: 'America/Chicago' },
      { label: 'Denver (MST/MDT)',        tz: 'America/Denver' },

      { label: 'London (GMT/BST)',             tz: 'Europe/London' },

      { label: 'Moscow (MSK)',                 tz: 'Europe/Moscow' },

  let _setupStep = 1;

  async function showSetupFlow() {
    document.getElementById('loginScreen').style.display  = 'none';
    document.getElementById('appLayout').style.display    = 'none';
    document.getElementById('setupScreen').style.display  = 'flex';
    _setupStep = 1;
    _setupTz   = getUserTz();
    // Fetch bot username in background for step 3
    fetch('/auth/bot').then(r => r.json()).then(d => { _setupBot = d.username || ''; }).catch(() => {});
    _renderSetup();
  }

  function _renderSetup() {
    const card = document.getElementById('setupCard');
    if (!card) return;
    if (_setupClock) { clearInterval(_setupClock); _setupClock = null; }
    if (_setupStep === 1) card.innerHTML = _setupHtml1();
    if (_setupStep === 2) { card.innerHTML = _setupHtml2(); _startSetupClock(); }
    if (_setupStep === 3) card.innerHTML = _setupHtml3();
  }

  function _setupDots(cur) {
    return `<div class="setup-progress">
      ${[1,2,3].map(i => `<div class="setup-dot${i<=cur?' active':''}"></div>`).join('')}
    </div>`;
  }

  function _setupHtml1() {
    const first = (state.user?.displayName || state.user?.username || 'there').split(' ')[0];
    return `
      <div class="setup-logo">Taskr</div>
      ${_setupDots(1)}
      <div class="setup-title">Welcome to Klone HQ, ${esc(first)}! 👋</div>
      <div class="setup-sub">Let's take 30 seconds to personalise your account so you get reminders at the right time.</div>
      <button class="setup-btn" onclick="_setupNext()">Get Started →</button>`;
  }

  function _setupHtml2() {
    const opts = TIMEZONE_OPTIONS.map(g =>
      `<optgroup label="${esc(g.region)}">
        ${g.zones.map(z =>
          `<option value="${esc(z.tz)}"${z.tz===_setupTz?' selected':''}>${esc(z.label)}</option>`
        ).join('')}
       </optgroup>`
    ).join('');

    return `

        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="5.5"/><path d="M7 1.5v2M7 10.5v2M1.5 7h2M10.5 7h2"/><circle cx="7" cy="7" r="1.8" fill="currentColor" stroke="none"/></svg>
        Detect my timezone automatically
      </button>
      <select class="setup-tz-select" id="setupTzSel" onchange="_setupTzChange(this.value)">${opts}</select>
      <div class="setup-live-time" id="setupClock">—</div>
