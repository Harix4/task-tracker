<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskr</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: rgba(255,255,255,0.80);
      --border: rgba(0,0,0,0.08);
      --shadow: 0 2px 20px rgba(0,0,0,0.06);
      --radius: 16px;
      --blue: #0071e3;
      --green: #34c759;
      --red: #ff3b30;
      --orange: #ff9500;
      --purple: #bf5af2;
      --pink: #ff375f;
      --teal: #5ac8fa;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --surface: rgba(28,28,30,0.88);
        --border: rgba(255,255,255,0.10);
        --shadow: 0 2px 20px rgba(0,0,0,0.50);
        --text: #f5f5f7;
        --muted: #86868b;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { border: none; cursor: pointer; font-family: inherit; background: none; }
    select { font-family: inherit; }

    /* ── Layout ─────────────────────────────────────────────── */
    .layout {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      padding: 20px 12px 16px;
    }

    .sidebar-brand {
      font-size: 17px;
      font-weight: 600;
      padding: 4px 12px 20px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
    @media (prefers-color-scheme: dark) {
      .nav-item:hover { background: rgba(255,255,255,0.07); }
    }
    .nav-item.active { background: var(--blue); color: #fff; }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 4px 0;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .ws-info { display: flex; align-items: center; gap: 8px; }
    .ws-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--blue); color: #fff;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ws-name { font-size: 12px; font-weight: 500; color: var(--muted); }

    .refresh-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
    }
    .refresh-dot.pulse {
      animation: dot-pulse 0.9s ease-out forwards;
    }
    @keyframes dot-pulse {
      0%   { transform: scale(1);   box-shadow: 0 0 0 0 rgba(52,199,89,.7); }
      50%  { transform: scale(1.3); box-shadow: 0 0 0 5px rgba(52,199,89,0); }
      100% { transform: scale(1);   box-shadow: 0 0 0 0 rgba(52,199,89,0); }
    }

    /* ── Main ───────────────────────────────────────────────── */
    #main {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 32px 36px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    /* ── Cards ──────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .card-header {
      padding: 15px 20px 13px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .card-body { padding: 4px 0; }

    /* ── Metric cards ───────────────────────────────────────── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 20px 22px;
    }

    .metric-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 34px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .metric-value.danger { color: var(--red); }

    /* ── Dashboard columns ──────────────────────────────────── */
    .dash-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── Task list rows ─────────────────────────────────────── */
    .task-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 20px;
      transition: background 0.1s;
    }
    .task-row:hover { background: rgba(0,0,0,0.025); }
    @media (prefers-color-scheme: dark) { .task-row:hover { background: rgba(255,255,255,0.03); } }

    .avatar {
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 700;
    }

    .task-info { flex: 1; min-width: 0; }
    .task-name {
      font-size: 13.5px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

    /* ── Pills ──────────────────────────────────────────────── */
    .pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 9px;
      border-radius: 100px;
      font-size: 11.5px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pill-ads        { background: rgba(191,90,242,.12); color: var(--purple); }
    .pill-fulfillment{ background: rgba(0,113,227,.12);  color: var(--blue); }
    .pill-creative   { background: rgba(255,55,95,.12);  color: var(--pink); }
    .pill-finance    { background: rgba(52,199,89,.12);  color: var(--green); }
    .pill-operations { background: rgba(255,149,0,.12);  color: var(--orange); }

    .status-pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 9px;
      border-radius: 100px;
      font-size: 11.5px;
      font-weight: 500;
      white-space: nowrap;
    }
    .s-not-started { background: rgba(142,142,147,.10); color: var(--muted); }
    .s-in-progress { background: rgba(0,113,227,.12);   color: var(--blue); }
    .s-in-review   { background: rgba(255,149,0,.12);   color: var(--orange); }
    .s-complete    { background: rgba(52,199,89,.12);   color: var(--green); }
    .s-blocked     { background: rgba(255,59,48,.12);   color: var(--red); }

    /* Priority dot */
    .p-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .p-high   { background: var(--red); }
    .p-medium { background: var(--orange); }
    .p-low    { background: var(--green); }

    /* ── Filter bar ─────────────────────────────────────────── */
    .filter-bar { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-tab {
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }
    .filter-tab:hover { background: rgba(0,0,0,0.04); color: var(--text); }
    @media (prefers-color-scheme: dark) { .filter-tab:hover { background: rgba(255,255,255,0.07); } }
    .filter-tab.active { background: var(--blue); color: #fff; }

    .search-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .search-input, .cat-select {
      height: 36px;
      padding: 0 12px;
      border: none;
      border-radius: 10px;
      background: rgba(0,0,0,0.05);
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: background 0.1s;
    }
    @media (prefers-color-scheme: dark) {
      .search-input, .cat-select { background: rgba(255,255,255,0.08); }
    }
    .search-input:focus, .cat-select:focus { background: rgba(0,0,0,0.08); }
    @media (prefers-color-scheme: dark) {
      .search-input:focus, .cat-select:focus { background: rgba(255,255,255,0.13); }
    }
    .search-input { flex: 1; }
    .cat-select { min-width: 160px; }
    .cat-select option { background: #fff; color: #000; }
    @media (prefers-color-scheme: dark) {
      .cat-select option { background: #1c1c1e; color: #f5f5f7; }
    }

    /* ── Table ──────────────────────────────────────────────── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }

    th {
      text-align: left;
      padding: 11px 16px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.015);
      white-space: nowrap;
    }
    @media (prefers-color-scheme: dark) { th { background: rgba(255,255,255,0.02); } }

    td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { cursor: pointer; transition: background 0.1s; }
    tbody tr:hover td { background: rgba(0,0,0,0.02); }
    @media (prefers-color-scheme: dark) { tbody tr:hover td { background: rgba(255,255,255,0.03); } }

    .sop-link-icon { color: var(--blue); font-size: 15px; }
    .sop-dash { color: var(--muted); }
    .td-task { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .td-assignee { display: flex; align-items: center; gap: 8px; }

    /* ── Overlay + Panel ────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.30);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }

    .panel {
      position: fixed; top: 0; right: 0;
      width: 380px; height: 100vh;
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 32px rgba(0,0,0,0.12);
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.26s cubic-bezier(0.32, 0, 0.12, 1);
      display: flex;
      flex-direction: column;
    }
    .panel.open { transform: translateX(0); }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .panel-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      line-height: 1.3;
    }
    .panel-close {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--muted);
      flex-shrink: 0; margin-top: 1px;
      transition: background 0.1s;
    }
    @media (prefers-color-scheme: dark) { .panel-close { background: rgba(255,255,255,0.09); } }
    .panel-close:hover { background: rgba(0,0,0,0.12); }
    @media (prefers-color-scheme: dark) { .panel-close:hover { background: rgba(255,255,255,0.16); } }
    .panel-body { flex: 1; overflow-y: auto; padding: 20px; }

    .d-section { margin-bottom: 20px; }
    .d-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .d-value { font-size: 13.5px; color: var(--text); }
    .d-sop-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--blue);
      font-size: 13.5px;
      font-weight: 500;
    }
    .d-sop-link:hover { text-decoration: underline; }

    /* ── Performance ────────────────────────────────────────── */
    .leaderboard {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 16px 20px 14px;
      min-width: 130px;
      text-align: center;
    }
    .podium-item.rank-1 { padding-top: 24px; }

    .medal { font-size: 26px; line-height: 1; }
    .podium-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .podium-rate { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }

    .rate-cell { display: flex; align-items: center; gap: 10px; }
    .rate-pct { font-weight: 600; font-size: 13px; min-width: 38px; text-align: right; }
    .rate-bar-bg {
      flex: 1; height: 4px;
      background: rgba(0,0,0,0.07);
      border-radius: 100px; overflow: hidden;
    }
    @media (prefers-color-scheme: dark) { .rate-bar-bg { background: rgba(255,255,255,0.09); } }
    .rate-bar-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 100px;
      transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── SOPs grid ──────────────────────────────────────────── */
    .sops-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
    }

    .sop-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }
    .sop-card-head {
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .sop-card-count { font-size: 12px; color: var(--muted); }
    .sop-item {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      font-size: 13px;
    }
    .sop-item:last-child { border-bottom: none; }
    .sop-item-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .no-sop-badge {
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,149,0,.12);
      color: var(--orange);
      padding: 2px 8px;
      border-radius: 100px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .sop-task-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--blue);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .sop-task-link:hover { text-decoration: underline; }

    /* ── Empty / loading ────────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      gap: 6px;
    }
    .empty-icon { font-size: 30px; margin-bottom: 2px; }

    /* ── New-task button ────────────────────────────────────── */
    .new-task-btn {
      height: 36px;
      padding: 0 16px;
      background: var(--blue);
      color: #fff;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      border: none;
      transition: opacity 0.1s;
      flex-shrink: 0;
    }
    .new-task-btn:hover { opacity: 0.85; }

    /* ── Create-task form ───────────────────────────────────── */
    .form-field { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(0,0,0,0.03);
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.12s, background 0.12s;
      appearance: none;
    }
    @media (prefers-color-scheme: dark) {
      .form-input { background: rgba(255,255,255,0.06); }
    }
    .form-input:focus { border-color: var(--blue); background: rgba(0,113,227,0.04); }
    @media (prefers-color-scheme: dark) {
      .form-input:focus { background: rgba(0,113,227,0.12); }
    }
    select.form-input { cursor: pointer; }
    .form-hint { font-size: 11.5px; color: var(--muted); margin-top: 4px; }

    .submit-btn {
      display: block;
      width: 100%;
      height: 40px;
      margin-top: 8px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .form-error {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(255,59,48,0.08);
      border: 1px solid rgba(255,59,48,0.2);
      border-radius: 10px;
      font-size: 12.5px;
      color: var(--red);
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">Taskr</div>

    <div class="nav">
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="1" width="6" height="6" rx="1.5"/>
          <rect x="9" y="1" width="6" height="6" rx="1.5"/>
          <rect x="1" y="9" width="6" height="6" rx="1.5"/>
          <rect x="9" y="9" width="6" height="6" rx="1.5"/>
        </svg>
        Dashboard
      </div>
      <div class="nav-item" data-page="tasks" onclick="navigate('tasks')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <path d="M3 4h10M3 8h10M3 12h6"/>
        </svg>
        Tasks
      </div>
      <div class="nav-item" data-page="performance" onclick="navigate('performance')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="9" width="3" height="6" rx="1"/>
          <rect x="6.5" y="5" width="3" height="10" rx="1"/>
          <rect x="12" y="1" width="3" height="14" rx="1"/>
        </svg>
        Performance
      </div>
      <div class="nav-item" data-page="sops" onclick="navigate('sops')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 1.5h6l3.5 3.5V14H4V1.5z"/>
          <path d="M10 1.5v3.5h3.5"/>
          <path d="M6.5 7.5h3M6.5 10h4.5"/>
        </svg>
        SOPs
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="ws-info">
        <div class="ws-avatar">EC</div>
        <div class="ws-name">Ecommerce</div>
      </div>
      <div class="refresh-dot" id="refreshDot" title="Live data"></div>
    </div>
  </nav>

  <!-- Main content -->
  <main id="main">
    <div class="empty"><div class="empty-icon">⏳</div>Loading…</div>
  </main>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- Slide-in detail panel -->
<aside class="panel" id="panel">
  <div class="panel-head">
    <div class="panel-title" id="panelTitle">Task details</div>
    <button class="panel-close" onclick="closePanel()" aria-label="Close">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</aside>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const state = {
    page: 'dashboard',
    tasks: [],
    perf: { members: [], topPerformer: null, generatedAt: null },
    filter: { status: 'All', search: '', category: '' },
  };

  // ── Utils ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m - 1];
    return `${mon} ${+day}, ${y}`;
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function weekStartStr() {
    const d = new Date();
    const dow = d.getDay();
    d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function daysAgo(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr + 'T00:00:00');
    return Math.floor((today - d) / 86400000);
  }

  function initials(name) {
    if (!name) return '?';
    const p = name.trim().split(/\s+/);
    return p.length >= 2 ? (p[0][0] + p[1][0]).toUpperCase() : p[0].slice(0,2).toUpperCase();
  }

  function firstName(name) {
    return name?.trim().split(/\s+/)[0] || 'Unknown';
  }

  const COLORS = ['#0071e3','#34c759','#ff9500','#bf5af2','#ff375f','#5ac8fa','#30d158'];
  function avatarColor(name) {
    let h = 0;
    for (let i = 0; i < (name||'').length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function avatarHtml(name, size = 30) {
    const c = avatarColor(name || '?');
    const fs = Math.floor(size * 0.38);
    return `<div class="avatar" style="width:${size}px;height:${size}px;background:${c};font-size:${fs}px">${esc(initials(name||'?'))}</div>`;
  }

  function catPill(cat) {
    if (!cat) return '';
    const cls = {Ads:'pill-ads',Fulfillment:'pill-fulfillment',Creative:'pill-creative',Finance:'pill-finance',Operations:'pill-operations'}[cat] || '';
    return `<span class="pill ${cls}">${esc(cat)}</span>`;
  }

  function statusPill(s) {
    if (!s) return '';
    const cls = {'To do':'s-not-started','In progress':'s-in-progress','In review':'s-in-review','Done':'s-complete'}[s] || 's-not-started';
    return `<span class="status-pill ${cls}">${esc(s)}</span>`;
  }

  function prioHtml(p) {
    if (!p) return '';
    const cls = {High:'p-high',Medium:'p-medium',Low:'p-low'}[p] || '';
    return `<div class="p-dot ${cls}" title="${esc(p)}"></div>`;
  }

  function dueDateHtml(d) {
    if (!d) return `<span style="color:var(--muted)">—</span>`;
    const today = todayStr();
    const over = d < today, now = d === today;
    const style = over ? 'color:var(--red);font-weight:600' : now ? 'color:var(--orange);font-weight:600' : '';
    return `<span style="${style}">${esc(fmtDate(d))}</span>`;
  }

  // ── Data fetching ──────────────────────────────────────────────────────────
  async function fetchAll() {
    try {
      const [tr, pr] = await Promise.all([
        fetch('/tasks').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch('/performance').then(r => r.ok ? r.json() : null).catch(() => null),
      ]);
      if (tr?.tasks) state.tasks = tr.tasks;
      if (pr?.members) state.perf = pr;
      flashDot();
    } catch (e) {
      console.warn('[taskr] fetch error:', e.message);
    }
    render();
  }

  function flashDot() {
    const dot = document.getElementById('refreshDot');
    if (!dot) return;
    dot.classList.remove('pulse');
    void dot.offsetWidth;
    dot.classList.add('pulse');
    setTimeout(() => dot.classList.remove('pulse'), 900);
  }

  // ── Navigation ─────────────────────────────────────────────────────────────
  function navigate(page) {
    state.page = page;
    state.filter = { status: 'All', search: '', category: '' };
    document.querySelectorAll('.nav-item').forEach(el =>
      el.classList.toggle('active', el.dataset.page === page)
    );
    closePanel();
    render();
  }

  // ── Panel ──────────────────────────────────────────────────────────────────
  function openPanel(taskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    document.getElementById('panelTitle').textContent = task.name;
    document.getElementById('panelBody').innerHTML = panelContent(task);
    document.getElementById('overlay').classList.add('show');
    document.getElementById('panel').classList.add('open');
  }

  function closePanel() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('panel').classList.remove('open');
  }

  function panelContent(t) {
    const assignee = t.assignees?.[0] || 'Unassigned';
    const sop = t.sop
      ? `<a href="${esc(t.sop)}" target="_blank" rel="noopener" class="d-sop-link">🔗 Open SOP</a>`
      : `<span class="no-sop-badge" style="font-size:12px;padding:3px 10px">No SOP — add one in Notion</span>`;
    const edited = t.lastEdited ? new Date(t.lastEdited).toLocaleDateString(undefined, {month:'short',day:'numeric',year:'numeric'}) : '—';
    return `
      <div class="d-section">
        <div class="d-label">Status</div>
        <div class="d-value">${statusPill(t.status)}</div>
      </div>
      <div class="d-section">
        <div class="d-label">Assignee</div>
        <div class="d-value" style="display:flex;align-items:center;gap:8px">
          ${avatarHtml(assignee, 26)}
          <span>${esc(assignee)}</span>
        </div>
      </div>
      <div class="d-section">
        <div class="d-label">Due Date</div>
        <div class="d-value">${dueDateHtml(t.dueDate)}</div>
      </div>
      <div class="d-section">
        <div class="d-label">Priority</div>
        <div class="d-value" style="display:flex;align-items:center;gap:7px">
          ${prioHtml(t.priority)}
          <span>${esc(t.priority || '—')}</span>
        </div>
      </div>
      <div class="d-section">
        <div class="d-label">Category</div>
        <div class="d-value">${catPill(t.category) || '—'}</div>
      </div>
      <div class="d-section">
        <div class="d-label">SOP</div>
        <div class="d-value">${sop}</div>
      </div>
      <div class="d-section">
        <div class="d-label">Last Edited</div>
        <div class="d-value" style="color:var(--muted);font-size:13px">${esc(edited)}</div>
      </div>
    `;
  }

  // ── Filter handler ─────────────────────────────────────────────────────────
  function setFilter(key, val) {
    const wasFocused = document.activeElement?.classList.contains('search-input');
    state.filter[key] = val;
    render();
    if (wasFocused) {
      const inp = document.querySelector('.search-input');
      if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
    }
  }

  // ── Metrics ────────────────────────────────────────────────────────────────
  function computeMetrics() {
    const today = todayStr(), wStart = weekStartStr();
    const named     = state.tasks.filter(t => t.name?.trim());
    const dueToday  = named.filter(t => t.dueDate === today && t.status !== 'Done');
    const overdue   = named.filter(t => t.dueDate && t.dueDate < today && t.status !== 'Done');
    const doneWeek  = named.filter(t => t.status === 'Done' && t.dueDate >= wStart && t.dueDate <= today);
    const ms = state.perf.members || [];
    const totA = ms.reduce((s,m) => s + m.assigned, 0);
    const totC = ms.reduce((s,m) => s + m.completed, 0);
    const teamRate = totA > 0 ? Math.round((totC / totA) * 100) : 0;
    return { dueToday, overdue, doneWeek, teamRate };
  }

  // ── Page renderers ─────────────────────────────────────────────────────────

  function renderDashboard() {
    const { dueToday, overdue, doneWeek, teamRate } = computeMetrics();
    const odClass = overdue.length > 0 ? ' danger' : '';

    const taskRow = (t, sub, subStyle = '') => {
      const a = t.assignees?.[0] || 'Unassigned';
      return `<div class="task-row">
        ${avatarHtml(a)}
        <div class="task-info">
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-sub" style="${subStyle}">${esc(sub)}</div>
        </div>
        ${catPill(t.category)}
        ${prioHtml(t.priority)}
      </div>`;
    };

    return `
      <div class="page-title">Dashboard</div>
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Due Today</div>
          <div class="metric-value">${dueToday.length}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Overdue</div>
          <div class="metric-value${odClass}">${overdue.length}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Completed This Week</div>
          <div class="metric-value">${doneWeek.length}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Team Completion Rate</div>
          <div class="metric-value">${teamRate}%</div>
        </div>
      </div>
      <div class="dash-cols">
        <div class="card">
          <div class="card-header">📋 Due Today</div>
          <div class="card-body">
            ${dueToday.length === 0
              ? '<div class="empty"><div class="empty-icon">✅</div>Nothing due today</div>'
              : dueToday.map(t => taskRow(t, firstName(t.assignees?.[0] || 'Unassigned'))).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-header">⚠️ Overdue</div>
          <div class="card-body">
            ${overdue.length === 0
              ? '<div class="empty"><div class="empty-icon">🎉</div>No overdue tasks</div>'
              : overdue.map(t => {
                  const d = daysAgo(t.dueDate);
                  return taskRow(t, `${d} day${d !== 1 ? 's' : ''} overdue`, 'color:var(--red)');
                }).join('')}
          </div>
        </div>
      </div>`;
  }

  function renderTasks() {
    const { status, search, category } = state.filter;
    const STATUSES = ['All','To do','In progress','In review','Done'];
    const CATS = ['Ads','Fulfillment','Creative','Finance','Operations'];

    let tasks = state.tasks.filter(t => t.name?.trim());
    if (status !== 'All') tasks = tasks.filter(t => t.status === status);
    if (search) {
      const q = search.toLowerCase();
      tasks = tasks.filter(t =>
        t.name.toLowerCase().includes(q) ||
        (t.assignees||[]).some(a => a.toLowerCase().includes(q))
      );
    }
    if (category) tasks = tasks.filter(t => t.category === category);

    const sopCell = t => t.sop
      ? `<a href="${esc(t.sop)}" target="_blank" rel="noopener" class="sop-link-icon" title="${esc(t.sop)}" onclick="event.stopPropagation()">🔗</a>`
      : `<span class="sop-dash">—</span>`;

    return `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        <div class="page-title" style="margin-bottom:0">Tasks</div>
        <button class="new-task-btn" onclick="openCreatePanel()">+ New Task</button>
      </div>
      <div class="filter-bar">
        ${STATUSES.map(s =>
          `<button class="filter-tab${s === status ? ' active' : ''}" onclick="setFilter('status','${s}')">${s}</button>`
        ).join('')}
      </div>
      <div class="search-row">
        <input class="search-input" type="text" placeholder="Search tasks or assignees…"
          value="${esc(search)}" oninput="setFilter('search',this.value)">
        <select class="cat-select" onchange="setFilter('category',this.value)">
          <option value="">All categories</option>
          ${CATS.map(c => `<option value="${c}"${c === category ? ' selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="table-wrap">
        ${tasks.length === 0
          ? '<div class="empty"><div class="empty-icon">🔍</div>No tasks match your filters</div>'
          : `<table>
            <thead><tr>
              <th>Task</th><th>Assignee</th><th>Category</th>
              <th>Priority</th><th>Due Date</th><th>Status</th><th>SOP</th>
            </tr></thead>
            <tbody>
              ${tasks.map(t => {
                const a = t.assignees?.[0] || 'Unassigned';
                return `<tr onclick="openPanel('${esc(t.id)}')">
                  <td class="td-task">${esc(t.name)}</td>
                  <td><div class="td-assignee">${avatarHtml(a,24)}<span style="font-size:13px">${esc(firstName(a))}</span></div></td>
                  <td>${catPill(t.category) || `<span style="color:var(--muted)">—</span>`}</td>
                  <td><div style="display:flex;align-items:center;gap:6px">${prioHtml(t.priority)}<span style="font-size:13px;color:var(--muted)">${esc(t.priority||'—')}</span></div></td>
                  <td>${dueDateHtml(t.dueDate)}</td>
                  <td>${statusPill(t.status)}</td>
                  <td>${sopCell(t)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`}
      </div>`;
  }

  function renderPerformance() {
    const members = (state.perf?.members || []).slice().sort((a,b) => b.completionRate - a.completionRate);
    const top3 = members.slice(0, 3);
    const medals = ['🥇','🥈','🥉'];
    // Podium order: 2nd left, 1st center, 3rd right
    const podium = top3.length >= 3
      ? [[top3[1],2],[top3[0],1],[top3[2],3]]
      : top3.map((m,i) => [m, i+1]);

    return `
      <div class="page-title">Performance</div>
      ${top3.length > 0 ? `
        <div class="leaderboard">
          ${podium.map(([m, rank]) => !m ? '' : `
            <div class="podium-item rank-${rank}">
              <div class="medal">${medals[rank-1]}</div>
              ${avatarHtml(m.name, 42)}
              <div class="podium-name">${esc(firstName(m.name))}</div>
              <div class="podium-rate">${m.completionRate}%</div>
            </div>
          `).join('')}
        </div>` : ''}
      <div class="table-wrap">
        ${members.length === 0
          ? '<div class="empty"><div class="empty-icon">📊</div>No performance data yet</div>'
          : `<table>
            <thead><tr>
              <th>Member</th><th>Assigned</th><th>Completed</th><th>Missed</th><th>Rate</th>
            </tr></thead>
            <tbody>
              ${members.map(m => `
                <tr style="cursor:default">
                  <td><div style="display:flex;align-items:center;gap:10px">
                    ${avatarHtml(m.name,28)}
                    <span style="font-weight:500">${esc(m.name)}</span>
                  </div></td>
                  <td style="font-variant-numeric:tabular-nums">${m.assigned}</td>
                  <td style="color:var(--green);font-weight:600;font-variant-numeric:tabular-nums">${m.completed}</td>
                  <td style="${m.missed>0?'color:var(--red);font-weight:600':''};font-variant-numeric:tabular-nums">${m.missed}</td>
                  <td>
                    <div class="rate-cell">
                      <span class="rate-pct">${m.completionRate}%</span>
                      <div class="rate-bar-bg">
                        <div class="rate-bar-fill" style="width:${m.completionRate}%"></div>
                      </div>
                    </div>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>`}
      </div>
      ${state.perf?.generatedAt ? `
        <div style="font-size:11.5px;color:var(--muted);margin-top:10px;text-align:right">
          Last computed: ${new Date(state.perf.generatedAt).toLocaleString()}
        </div>` : ''}`;
  }

  function renderSOPs() {
    const CATS = ['Ads','Fulfillment','Creative','Finance','Operations'];

    const cards = CATS.map(cat => {
      const tasks = state.tasks.filter(t => t.category === cat);
      if (tasks.length === 0) return '';
      return `
        <div class="sop-card">
          <div class="sop-card-head">
            ${catPill(cat)}
            <span class="sop-card-count">${tasks.length} task${tasks.length!==1?'s':''}</span>
          </div>
          ${tasks.map(t => `
            <div class="sop-item">
              <span class="sop-item-name">${esc(t.name)}</span>
              ${t.sop
                ? `<a href="${esc(t.sop)}" target="_blank" rel="noopener" class="sop-task-link">🔗 SOP</a>`
                : `<span class="no-sop-badge">Add SOP</span>`}
            </div>`).join('')}
        </div>`;
    }).filter(Boolean);

    return `
      <div class="page-title">SOPs</div>
      <div class="sops-grid">
        ${cards.length > 0 ? cards.join('') : '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📄</div>No tasks found</div>'}
      </div>`;
  }

  // ── Create-task panel ──────────────────────────────────────────────────────
  async function openCreatePanel() {
    let users = [];
    try {
      const r = await fetch('/users');
      if (r.ok) users = (await r.json()).users || [];
    } catch (_) {}

    document.getElementById('panelTitle').textContent = 'New Task';
    document.getElementById('panelBody').innerHTML = renderCreateForm(users);
    document.getElementById('overlay').classList.add('show');
    document.getElementById('panel').classList.add('open');
    document.getElementById('fieldName')?.focus();
  }

  function renderCreateForm(users) {
    const assigneeOpts = users.length
      ? `<select name="assigneeId" id="fieldAssignee" class="form-input">
           <option value="">Unassigned</option>
           ${users.map(u => `<option value="${esc(u.id)}">${esc(u.name)}</option>`).join('')}
         </select>`
      : `<div class="form-hint">Workspace users couldn't be loaded — set the assignee in Notion after creating.</div>`;

    return `
      <form id="createForm" onsubmit="submitNewTask(event)" autocomplete="off">
        <div class="form-field">
          <label class="form-label" for="fieldName">Task Name *</label>
          <input id="fieldName" name="name" class="form-input" type="text" required
            placeholder="e.g. Review COGS sheet">
        </div>
        <div class="form-field">
          <label class="form-label" for="fieldAssignee">Assignee</label>
          ${assigneeOpts}
        </div>
        <div class="form-field">
          <label class="form-label" for="fieldDue">Due Date</label>
          <input id="fieldDue" name="dueDate" class="form-input" type="date">
        </div>
        <div class="form-field">
          <label class="form-label" for="fieldStatus">Status</label>
          <select id="fieldStatus" name="status" class="form-input">
            <option value="To do" selected>To do</option>
            <option value="In progress">In progress</option>
            <option value="In review">In review</option>
            <option value="Done">Done</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="fieldPriority">Priority</label>
          <select id="fieldPriority" name="priority" class="form-input">
            <option value="">—</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="fieldCategory">Category</label>
          <select id="fieldCategory" name="category" class="form-input">
            <option value="">—</option>
            <option value="Ads">Ads</option>
            <option value="Fulfillment">Fulfillment</option>
            <option value="Creative">Creative</option>
            <option value="Finance">Finance</option>
            <option value="Operations">Operations</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="fieldSOP">SOP <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
          <input id="fieldSOP" name="sop" class="form-input" type="url"
            placeholder="https://…">
        </div>
        <button type="submit" class="submit-btn" id="createSubmitBtn">Create Task</button>
        <div id="createError" style="display:none" class="form-error"></div>
      </form>`;
  }

  async function submitNewTask(e) {
    e.preventDefault();
    const form = document.getElementById('createForm');
    const btn  = document.getElementById('createSubmitBtn');
    const errEl = document.getElementById('createError');

    const data = Object.fromEntries(new FormData(form));
    // Strip empty strings so the backend skips optional fields
    Object.keys(data).forEach(k => { if (!data[k]) delete data[k]; });

    btn.disabled = true;
    btn.textContent = 'Creating…';
    errEl.style.display = 'none';

    try {
      const res = await fetch('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'Failed to create task');

      closePanel();
      // Prepend the new task to local state immediately, then background-refresh
      state.tasks.unshift(result.task);
      render();
      fetchAll(); // sync the full list from Notion in the background
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create Task';
    }
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    const main = document.getElementById('main');
    switch (state.page) {
      case 'dashboard':   main.innerHTML = renderDashboard();   break;
      case 'tasks':       main.innerHTML = renderTasks();       break;
      case 'performance': main.innerHTML = renderPerformance(); break;
      case 'sops':        main.innerHTML = renderSOPs();        break;
    }
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  fetchAll();
  setInterval(fetchAll, 60000);
</script>
</body>
</html>
